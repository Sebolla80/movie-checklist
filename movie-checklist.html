<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080810;--bg2:#0e0e1a;--bg3:#13131f;
  --surface:#1a1a2e;--surface2:#20203a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#f0f0ff;--text2:#9090b0;--text3:#50506a;
  --cyan:#00e5ff;--cyan-dim:rgba(0,229,255,0.08);--cyan-glow:rgba(0,229,255,0.2);
  --violet:#b44dff;--violet-dim:rgba(180,77,255,0.08);
  --green:#39ff8a;--green-dim:rgba(57,255,138,0.08);--green-border:rgba(57,255,138,0.25);
  --red:#ff4d6d;--r:12px;--r-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;min-height:100vh;}

/* AUTH */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
.auth-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(0,229,255,0.07) 0%,rgba(180,77,255,0.05) 50%,transparent 70%);pointer-events:none;}
.auth-logo{font-family:'Space Grotesk',sans-serif;font-size:3rem;font-weight:700;background:linear-gradient(135deg,var(--cyan) 0%,var(--violet) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem;position:relative;}
.auth-tagline{color:var(--text2);font-size:14px;margin-bottom:2.5rem;letter-spacing:.02em;}
.btn-google{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:14px 28px;border-radius:var(--r);font-size:15px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.btn-google:hover{border-color:rgba(0,229,255,0.35);box-shadow:0 0 24px rgba(0,229,255,0.1);}
.btn-google svg{flex-shrink:0;}

/* APP */
#app-screen{display:none;min-height:100vh;flex-direction:column;}
header{position:sticky;top:0;z-index:100;background:rgba(8,8,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.5rem;height:60px;display:flex;align-items:center;gap:1rem;}
.header-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;background:linear-gradient(135deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0;text-decoration:none;cursor:pointer;}
.header-nav{display:flex;gap:4px;margin-left:.75rem;}
.nav-btn{padding:6px 14px;border-radius:20px;border:1px solid transparent;background:transparent;color:var(--text2);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;}
.nav-btn:hover{color:var(--text);border-color:var(--border2);}
.nav-btn.active{background:var(--cyan-dim);border-color:rgba(0,229,255,0.3);color:var(--cyan);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(0,229,255,0.3);}
.user-name{font-size:13px;color:var(--text2);}
.btn-signout{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:var(--r-sm);font-family:'Inter',sans-serif;transition:color .15s;}
.btn-signout:hover{color:var(--text2);}

main{flex:1;max-width:760px;width:100%;margin:0 auto;padding:2rem 1.5rem;}
.view{display:none;}.view.active{display:block;}

/* SEARCH VIEW */
.search-hero{text-align:center;padding:2.5rem 0 2rem;position:relative;}
.search-hero h1{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;margin-bottom:.5rem;}
.search-hero p{color:var(--text2);font-size:14px;}
.search-bar{display:flex;gap:8px;max-width:560px;margin:1.5rem auto 0;}
.search-input{flex:1;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:12px 16px;border-radius:var(--r);font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:all .2s;}
.search-input:focus{border-color:rgba(0,229,255,0.4);box-shadow:0 0 0 3px rgba(0,229,255,0.06);}
.search-input::placeholder{color:var(--text3);}
.btn-search{background:linear-gradient(135deg,var(--cyan),#0099cc);color:#000;border:none;padding:12px 22px;border-radius:var(--r);font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.btn-search:hover{opacity:.88;}

/* SUGGESTIONS */
#suggestions{max-width:560px;margin:8px auto 0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;}
.sug-item{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;}
.sug-item:last-child{border-bottom:none;}
.sug-item:hover{background:var(--surface2);}
.sug-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--surface2);flex-shrink:0;}
.sug-name{font-size:14px;font-weight:500;}
.sug-known{font-size:12px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sug-type{margin-left:auto;font-size:11px;color:var(--text3);background:var(--bg3);padding:3px 9px;border-radius:20px;flex-shrink:0;border:1px solid var(--border);}

/* PERSON */
.person-back{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px;cursor:pointer;margin-bottom:1.5rem;border:none;background:none;font-family:'Inter',sans-serif;transition:color .15s;padding:0;}
.person-back:hover{color:var(--cyan);}
.person-banner{display:flex;align-items:center;gap:20px;margin-bottom:1.5rem;padding:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);position:relative;overflow:hidden;}
.person-banner::after{content:'';position:absolute;top:-60px;right:-60px;width:250px;height:250px;background:radial-gradient(circle,var(--cyan-glow) 0%,transparent 70%);pointer-events:none;}
.person-photo{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid rgba(0,229,255,0.35);flex-shrink:0;}
.person-photo-ph{width:72px;height:72px;border-radius:50%;background:var(--surface);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.person-name{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;}
.person-dept{font-size:13px;color:var(--text2);margin-top:3px;}
.person-stats{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.stat-pill{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);}
.stat-pill.cyan{color:var(--cyan);border-color:rgba(0,229,255,0.3);background:var(--cyan-dim);}
.stat-pill.green{color:var(--green);border-color:var(--green-border);background:var(--green-dim);}

/* FILTERS */
.filters-bar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.f-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.f-btn:hover{border-color:var(--border2);color:var(--text);}
.f-btn.active{background:var(--cyan-dim);border-color:rgba(0,229,255,0.35);color:var(--cyan);}
.sort-sel{margin-left:auto;font-size:12px;padding:6px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;outline:none;}

/* MOVIE CARDS */
.movie-list{display:flex;flex-direction:column;gap:6px;}
.movie-card{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);transition:border-color .15s;}
.movie-card:hover{border-color:var(--border2);}
.movie-card.seen{background:rgba(57,255,138,0.025);border-color:rgba(57,255,138,0.15);}
.movie-poster{width:46px;height:69px;border-radius:6px;object-fit:cover;background:var(--surface);flex-shrink:0;}
.movie-poster-ph{width:46px;height:69px;border-radius:6px;background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text3);}
.movie-body{flex:1;min-width:0;padding-top:2px;}
.movie-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.movie-meta{display:flex;gap:8px;align-items:center;margin-top:4px;}
.movie-year{font-size:12px;color:var(--text3);}
.movie-rating{font-size:12px;color:var(--text2);}
.platforms{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.ptag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
.pt-netflix{background:#E50914;color:#fff;}
.pt-disney{background:#113CCF;color:#fff;}
.pt-hbo{background:#5E2BE8;color:#fff;}
.pt-amazon{background:#00A8E0;color:#000;}
.pt-apple{background:#444;color:#fff;}
.pt-paramount{background:#0064FF;color:#fff;}
.pt-default{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.movie-note-prev{font-size:12px;color:var(--text2);margin-top:5px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.movie-actions{display:flex;flex-direction:column;gap:6px;align-items:center;flex-shrink:0;padding-top:18px;}
.check-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;color:var(--text3);font-size:15px;transition:all .15s;}
.check-btn:hover{border-color:var(--green);color:var(--green);}
.check-btn.seen{background:var(--green);border-color:var(--green);color:#000;}
.note-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;color:var(--text3);font-size:14px;transition:all .15s;}
.note-btn:hover{border-color:var(--violet);color:var(--violet);}
.note-btn.has{color:var(--violet);border-color:rgba(180,77,255,0.4);background:var(--violet-dim);}

/* LISTS VIEW */
.lists-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap;}
.lists-title{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;}
.lists-filter-input{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:9px 14px;border-radius:var(--r);font-size:14px;font-family:'Inter',sans-serif;outline:none;width:220px;transition:border-color .2s;}
.lists-filter-input:focus{border-color:rgba(0,229,255,0.4);}
.lists-filter-input::placeholder{color:var(--text3);}
.lists-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.list-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.list-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--violet));opacity:0;transition:opacity .2s;}
.list-card:hover{border-color:rgba(0,229,255,0.2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.list-card:hover::before{opacity:1;}
.list-card-photo{width:52px;height:52px;border-radius:50%;object-fit:cover;background:var(--surface);border:2px solid var(--border2);margin-bottom:.75rem;}
.list-card-photo-ph{width:52px;height:52px;border-radius:50%;background:var(--surface);border:2px solid var(--border2);margin-bottom:.75rem;display:flex;align-items:center;justify-content:center;font-size:22px;}
.list-card-name{font-size:14px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-card-dept{font-size:11px;color:var(--text3);margin-bottom:.6rem;}
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--violet));border-radius:2px;}
.progress-label{font-size:11px;color:var(--text2);}
.list-card-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px 6px;border-radius:var(--r-sm);transition:color .15s;line-height:1;}
.list-card-del:hover{color:var(--red);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;backdrop-filter:blur(6px);}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:1.5rem;width:100%;max-width:480px;box-shadow:0 0 60px rgba(0,229,255,0.07);}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:600;margin-bottom:4px;}
.modal-movie{font-size:13px;color:var(--text2);margin-bottom:1rem;}
.modal-textarea{width:100%;min-height:140px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:12px;border-radius:var(--r-sm);font-size:14px;font-family:'Inter',sans-serif;resize:vertical;outline:none;line-height:1.6;transition:border-color .2s;}
.modal-textarea:focus{border-color:rgba(0,229,255,0.4);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
.btn-cancel{padding:9px 18px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--border);color:var(--text2);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.btn-cancel:hover{border-color:var(--border2);}
.btn-save{padding:9px 18px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--cyan),#0099cc);border:none;color:#000;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s;}
.btn-save:hover{opacity:.88;}

/* MISC */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;line-height:1.8;}
.empty-icon{font-size:2.5rem;display:block;margin-bottom:.75rem;}
.loading-msg{text-align:center;padding:2rem;color:var(--text2);font-size:14px;}
.error-bar{padding:10px 14px;border-radius:var(--r-sm);background:rgba(255,77,109,0.08);color:var(--red);font-size:13px;margin-bottom:1rem;border:1px solid rgba(255,77,109,0.2);}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 22px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.toast.show{opacity:1;}

@media(max-width:600px){
  header{padding:0 1rem;}
  .user-name{display:none;}
  main{padding:1.5rem 1rem;}
  .search-hero h1{font-size:1.4rem;}
  .search-bar{flex-direction:column;}
  .lists-filter-input{width:100%;}
  .lists-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));}
  .person-banner{flex-direction:column;text-align:center;}
  .person-stats{justify-content:center;}
}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-glow"></div>
  <div class="auth-logo">🎬 Movie Checklist</div>
  <div class="auth-tagline">Tu filmografía personal. Marcá lo que viste, anotá lo que pensás.</div>
  <button class="btn-google" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Entrar con Google
  </button>
</div>

<div id="app-screen">
  <header>
    <span class="header-logo" onclick="goHome()">🎬 Movie Checklist</span>
    <nav class="header-nav">
      <button class="nav-btn active" id="nav-search" onclick="showView('search')">Buscar</button>
      <button class="nav-btn" id="nav-lists" onclick="showView('lists')">Mis filmografías</button>
    </nav>
    <div class="header-right">
      <img class="user-avatar" id="userAvatar" src="" alt="">
      <span class="user-name" id="userName"></span>
      <button class="btn-signout" onclick="signOut()">Salir</button>
    </div>
  </header>

  <main>
    <div id="errorMsg"></div>

    <div class="view active" id="view-search">
      <div class="search-hero">
        <h1>Buscá un director o actor</h1>
        <p>Encontrá su filmografía completa y llevá el registro de lo que viste</p>
        <div class="search-bar">
          <input class="search-input" id="searchInput" type="text" placeholder="Ej: Tarantino, Cate Blanchett..." autocomplete="off"/>
          <button class="btn-search" onclick="doSearch()">Buscar</button>
        </div>
      </div>
      <div id="suggestions"></div>

      <div id="person-view" style="display:none;margin-top:1.5rem;">
        <button class="person-back" onclick="closePerson()">← Volver a buscar</button>
        <div id="person-banner"></div>
        <div class="filters-bar">
          <button class="f-btn active" onclick="setFilter('all',this)">Todas</button>
          <button class="f-btn" onclick="setFilter('seen',this)">Vistas</button>
          <button class="f-btn" onclick="setFilter('unseen',this)">No vistas</button>
          <button class="f-btn" onclick="setFilter('streaming',this)">En streaming</button>
          <select class="sort-sel" onchange="setSort(this.value)">
            <option value="year_desc">Más recientes</option>
            <option value="year_asc">Más antiguas</option>
            <option value="rating_desc">Mejor calificadas</option>
            <option value="title_asc">A–Z</option>
          </select>
        </div>
        <div id="movieList"></div>
      </div>
    </div>

    <div class="view" id="view-lists">
      <div class="lists-header">
        <div class="lists-title">Mis filmografías</div>
        <input class="lists-filter-input" type="text" id="listsFilter" placeholder="Filtrar por nombre..." oninput="filterLists(this.value)">
      </div>
      <div id="listsGrid" class="lists-grid"><div class="loading-msg">Cargando...</div></div>
    </div>
  </main>
</div>

<div id="noteModal" class="modal-overlay" style="display:none;" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">Mi análisis</div>
    <div class="modal-movie" id="modalMovieTitle"></div>
    <textarea class="modal-textarea" id="noteText" placeholder="¿Qué te pareció? Anotá lo que quieras recordar..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveNote()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut as fbSignOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc,deleteDoc,collection,getDocs}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyAswngzSg6KY8R-KaA-eB8FyVUJjiyegfw",authDomain:"movie-check-44bc1.firebaseapp.com",projectId:"movie-check-44bc1",storageBucket:"movie-check-44bc1.firebasestorage.app",messagingSenderId:"678806444530",appId:"1:678806444530:web:62163889af6afe5bbdb36b"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

const gp=new GoogleAuthProvider();

const BASE='https://api.themoviedb.org/3';

let cu=null,movies=[],prov={},seen={},notes={},filt='all',srt='year_desc',pid=null,nmid=null,allLists=[];

window.signIn=async()=>{try{await signInWithPopup(auth,gp);}catch(e){showError('No se pudo iniciar sesión.');}};
window.signOut=async()=>{await fbSignOut(auth);location.reload();};

onAuthStateChanged(auth,u=>{
  cu=u;
  if(u){
    document.getElementById('auth-screen').style.display='none';
    const as=document.getElementById('app-screen');
    as.style.display='flex';as.style.flexDirection='column';
    document.getElementById('userAvatar').src=u.photoURL||'';
    document.getElementById('userName').textContent=u.displayName?.split(' ')[0]||'';
    loadLists();
  }else{
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});

async function tmdb(p){
  const r=await fetch(BASE+p+(p.includes('?')?'&':'?')+'language=es-AR',{headers:H});
  if(!r.ok)throw new Error('Error '+r.status);
  return r.json();
}

window.showView=v=>{
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  if(v==='lists')loadLists();
};

window.goHome=()=>{closePerson();showView('search');};

window.doSearch=async()=>{
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  showError('');closePerson();
  document.getElementById('suggestions').innerHTML='<div class="loading-msg">Buscando...</div>';
  try{
    const d=await tmdb('/search/person?query='+encodeURIComponent(q)+'&include_adult=false');
    const res=(d.results||[]).slice(0,7);
    if(!res.length){document.getElementById('suggestions').innerHTML='<div class="loading-msg">Sin resultados</div>';return;}
    document.getElementById('suggestions').innerHTML=res.map(p=>{
      const dept=p.known_for_department==='Directing'?'Director/a':p.known_for_department==='Acting'?'Actor/Actriz':(p.known_for_department||'');
      const kf=(p.known_for||[]).slice(0,2).map(m=>m.title||m.name).join(', ');
      return`<div class="sug-item" onclick="loadPerson(${p.id},'${esc(p.name)}','${esc(p.profile_path||'')}','${esc(dept)}')">
        ${p.profile_path?`<img class="sug-avatar" src="https://image.tmdb.org/t/p/w45${p.profile_path}" />`:`<div class="sug-avatar" style="display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--surface2);">👤</div>`}
        <div style="flex:1;min-width:0;"><div class="sug-name">${esc(p.name)}</div>${kf?`<div class="sug-known">${esc(kf)}</div>`:''}</div>
        <span class="sug-type">${dept}</span>
      </div>`;
    }).join('');
  }catch(e){showError('Error al buscar. Revisá tu conexión.');document.getElementById('suggestions').innerHTML='';}
};

window.loadPerson=async(id,name,photo,dept)=>{
  document.getElementById('suggestions').innerHTML='';
  document.getElementById('searchInput').value='';
  document.getElementById('person-view').style.display='block';
  document.getElementById('movieList').innerHTML='<div class="loading-msg">Cargando filmografía...</div>';
  pid=String(id);showError('');
  try{
    await loadUD(id);
    const cr=await tmdb('/person/'+id+'/movie_credits');
    const raw=dept==='Director/a'?(cr.crew||[]).filter(m=>m.job==='Director'):(cr.cast||[]);
    const s=new Set();movies=[];
    for(const m of raw){if(!s.has(m.id)&&m.title){s.add(m.id);movies.push(m);}}
    movies.sort((a,b)=>(b.release_date||'').localeCompare(a.release_date||''));
    const ph=photo?`<img class="person-photo" src="https://image.tmdb.org/t/p/w185${photo}" />`:`<div class="person-photo-ph">👤</div>`;
    document.getElementById('person-banner').innerHTML=`${ph}<div><div class="person-name">${esc(name)}</div><div class="person-dept">${dept}</div><div class="person-stats"><span class="stat-pill cyan">${movies.length} películas</span><span class="stat-pill green" id="seenChip">0 vistas</span></div></div>`;
    await loadProv(movies.slice(0,40));
    renderMovies();
    await saveMeta(id,name,photo,dept,movies.length);
  }catch(e){showError('Error al cargar. '+e.message);}
};

function closePerson(){
  document.getElementById('person-view').style.display='none';
  document.getElementById('suggestions').innerHTML='';
  pid=null;movies=[];seen={};notes={};
}
window.closePerson=closePerson;

async function loadUD(id){
  if(!cu)return;
  try{
    const s=await getDoc(doc(db,'users',cu.uid,'lists',String(id)));
    if(s.exists()){const d=s.data();seen=d.seen||{};notes=d.notes||{};}
    else{seen={};notes={};}
  }catch(e){seen={};notes={};}
}

async function saveUD(){
  if(!cu||!pid)return;
  try{await setDoc(doc(db,'users',cu.uid,'lists',pid),{seen,notes},{merge:true});}
  catch(e){showError('No se pudo guardar.');}
}

async function saveMeta(id,name,photo,dept,total){
  if(!cu)return;
  try{await setDoc(doc(db,'users',cu.uid,'lists',String(id)),{personId:id,name,photo,dept,total,updatedAt:Date.now()},{merge:true});}
  catch(e){}
}

async function loadLists(){
  if(!cu)return;
  try{
    const s=await getDocs(collection(db,'users',cu.uid,'lists'));
    allLists=[];
    s.forEach(d=>{if(d.data().name)allLists.push(d.data());});
    allLists.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
    renderLists(allLists);
  }catch(e){document.getElementById('listsGrid').innerHTML='<div class="empty-state"><span class="empty-icon">⚠️</span>Error al cargar.</div>';}
}

function renderLists(list){
  const el=document.getElementById('listsGrid');
  if(!list.length){el.innerHTML='<div class="empty-state"><span class="empty-icon">🎬</span>Todavía no guardaste ninguna filmografía.<br>Buscá un director o actor para empezar.</div>';return;}
  el.innerHTML=list.map(l=>{
    const sc=Object.keys(l.seen||{}).length;
    const tot=l.total||1;
    const pct=Math.round((sc/tot)*100);
    return`<div class="list-card" onclick="openFromList(${l.personId},'${esc(l.name)}','${esc(l.photo||'')}','${esc(l.dept||'')}')">
      <button class="list-card-del" onclick="delList(event,${l.personId})">✕</button>
      ${l.photo?`<img class="list-card-photo" src="https://image.tmdb.org/t/p/w92${l.photo}" />`:`<div class="list-card-photo-ph">👤</div>`}
      <div class="list-card-name">${esc(l.name)}</div>
      <div class="list-card-dept">${esc(l.dept||'')}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${sc} de ${tot} vistas · ${pct}%</div>
    </div>`;
  }).join('');
}

window.filterLists=q=>{renderLists(allLists.filter(l=>l.name.toLowerCase().includes(q.toLowerCase())));};
window.openFromList=(id,name,photo,dept)=>{showView('search');loadPerson(id,name,photo,dept);};
window.delList=async(e,id)=>{
  e.stopPropagation();
  if(!confirm('¿Eliminás esta filmografía? Perdés lo que tenías marcado.'))return;
  try{await deleteDoc(doc(db,'users',cu.uid,'lists',String(id)));showToast('Lista eliminada');loadLists();}
  catch(e){showError('No se pudo eliminar.');}
};

async function loadProv(ms){
  prov={};
  await Promise.allSettled(ms.map(m=>
    fetch(BASE+'/movie/'+m.id+'/watch/providers',{headers:H})
      .then(r=>r.json()).then(d=>{prov[m.id]=parseProv(d);}).catch(()=>{})
  ));
}

function parseProv(d){
  const ar=d?.results?.AR||d?.results?.US||{};
  const all=[...(ar.flatrate||[]),...(ar.free||[]),...(ar.ads||[])];
  const s=new Set();
  return all.filter(p=>{if(s.has(p.provider_id))return false;s.add(p.provider_id);return true;}).slice(0,4);
}

function pc(n){
  const l=n.toLowerCase();
  if(l.includes('netflix'))return'pt-netflix';
  if(l.includes('disney'))return'pt-disney';
  if(l.includes('max')||l.includes('hbo'))return'pt-hbo';
  if(l.includes('prime')||l.includes('amazon'))return'pt-amazon';
  if(l.includes('apple'))return'pt-apple';
  if(l.includes('paramount'))return'pt-paramount';
  return'pt-default';
}

function renderMovies(){
  let list=[...movies];
  if(filt==='seen')list=list.filter(m=>seen[m.id]);
  if(filt==='unseen')list=list.filter(m=>!seen[m.id]);
  if(filt==='streaming')list=list.filter(m=>prov[m.id]?.length);
  if(srt==='year_desc')list.sort((a,b)=>(b.release_date||'').localeCompare(a.release_date||''));
  if(srt==='year_asc')list.sort((a,b)=>(a.release_date||'').localeCompare(b.release_date||''));
  if(srt==='rating_desc')list.sort((a,b)=>(b.vote_average||0)-(a.vote_average||0));
  if(srt==='title_asc')list.sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  const sc=movies.filter(m=>seen[m.id]).length;
  const ch=document.getElementById('seenChip');
  if(ch)ch.textContent=sc+' vistas';
  if(!list.length){document.getElementById('movieList').innerHTML='<div class="empty-state"><span class="empty-icon">🔍</span>No hay películas con ese filtro.</div>';return;}
  document.getElementById('movieList').innerHTML='<div class="movie-list">'+list.map(m=>{
    const yr=m.release_date?m.release_date.substring(0,4):'—';
    const rt=m.vote_average?'★ '+m.vote_average.toFixed(1):'';
    const sv=!!seen[m.id];
    const nt=notes[m.id]||'';
    const pl=prov[m.id]||[];
    const ph=pl.map(p=>`<span class="ptag ${pc(p.provider_name)}">${p.provider_name}</span>`).join('');
    return`<div class="movie-card ${sv?'seen':''}">
      ${m.poster_path?`<img class="movie-poster" src="https://image.tmdb.org/t/p/w92${m.poster_path}" loading="lazy" alt="${esc(m.title)}" />`:`<div class="movie-poster-ph">🎬</div>`}
      <div class="movie-body">
        <div class="movie-title">${esc(m.title)}</div>
        <div class="movie-meta"><span class="movie-year">${yr}</span>${rt?`<span class="movie-rating">${rt}</span>`:''}</div>
        ${ph?`<div class="platforms">${ph}</div>`:''}
        ${nt?`<div class="movie-note-prev">${esc(nt)}</div>`:''}
      </div>
      <div class="movie-actions">
        <button class="check-btn ${sv?'seen':''}" onclick="tSeen(${m.id})" title="${sv?'Desmarcar':'Marcar como vista'}">✓</button>
        <button class="note-btn ${nt?'has':''}" onclick="oModal(${m.id},'${esc(m.title)}')" title="Agregar nota">✏</button>
      </div>
    </div>`;
  }).join('')+'</div>';
}

window.tSeen=async id=>{
  if(seen[id]){delete seen[id];}else{seen[id]=true;}
  renderMovies();await saveUD();
  showToast(seen[id]?'Marcada como vista ✓':'Desmarcada');
};

window.setFilter=(f,btn)=>{filt=f;document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderMovies();};
window.setSort=v=>{srt=v;renderMovies();};

window.oModal=(id,title)=>{nmid=id;document.getElementById('modalMovieTitle').textContent=title;document.getElementById('noteText').value=notes[id]||'';document.getElementById('noteModal').style.display='flex';setTimeout(()=>document.getElementById('noteText').focus(),100);};
window.closeModal=()=>{document.getElementById('noteModal').style.display='none';nmid=null;};
window.closeModalOutside=e=>{if(e.target===document.getElementById('noteModal'))closeModal();};
window.saveNote=async()=>{
  const t=document.getElementById('noteText').value.trim();
  if(t){notes[nmid]=t;}else{delete notes[nmid];}
  closeModal();renderMovies();await saveUD();showToast('Nota guardada ✓');
};

function showError(m){document.getElementById('errorMsg').innerHTML=m?`<div class="error-bar">${esc(m)}</div>`:'';}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
</script>
