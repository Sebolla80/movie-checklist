<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #e8c96d;
    --accent-dim: rgba(232,201,109,0.12);
    --seen-bg: #1a1f14;
    --seen-border: rgba(130,185,90,0.25);
    --seen-check: #82b95a;
    --danger: #e05a5a;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* AUTH SCREEN */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }
  .auth-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2.5rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-bottom: 0.5rem;
  }
  .auth-sub {
    color: var(--text2);
    font-size: 14px;
    margin-bottom: 2.5rem;
  }
  .btn-google {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 12px 24px;
    border-radius: var(--radius);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-google:hover { background: var(--surface2); border-color: rgba(255,255,255,0.25); }
  .btn-google svg { flex-shrink: 0; }

  /* APP LAYOUT */
  #app-screen { display: none; min-height: 100vh; }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .header-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    color: var(--accent);
    flex-shrink: 0;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .user-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--border2);
  }
  .user-name { font-size: 13px; color: var(--text2); }
  .btn-signout {
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
  }
  .btn-signout:hover { color: var(--text2); background: var(--surface); }

  main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* SEARCH */
  .search-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--border2); }
  .search-input::placeholder { color: var(--text3); }
  .btn-search {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn-search:hover { opacity: 0.88; }

  /* SUGGESTIONS */
  #suggestions {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    overflow: hidden;
    margin-top: -1rem;
    margin-bottom: 1.5rem;
  }
  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--surface2); }
  .sug-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    object-fit: cover; background: var(--surface2); flex-shrink: 0;
  }
  .sug-name { font-size: 14px; font-weight: 500; }
  .sug-known { font-size: 12px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sug-type {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  /* PERSON HEADER */
  #person-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .person-photo {
    width: 60px; height: 60px; border-radius: 50%;
    object-fit: cover; background: var(--surface); flex-shrink: 0;
    border: 1px solid var(--border2);
  }
  .person-name { font-family: 'DM Serif Display', serif; font-size: 1.4rem; }
  .person-dept { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .person-stats { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .stat-chip {
    font-size: 12px; color: var(--text2);
    background: var(--surface); padding: 3px 10px;
    border-radius: 20px; border: 1px solid var(--border);
  }
  .stat-chip.gold { color: var(--accent); border-color: rgba(232,201,109,0.3); background: var(--accent-dim); }

  /* FILTERS */
  .filters-row {
    display: flex; gap: 6px; margin-bottom: 1rem;
    flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    font-size: 12px; padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 500; }
  .sort-sel {
    margin-left: auto;
    font-size: 12px; padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* MOVIE CARDS */
  .movie-list { display: flex; flex-direction: column; gap: 6px; }
  .movie-card {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    transition: border-color 0.15s;
  }
  .movie-card:hover { border-color: var(--border2); }
  .movie-card.seen { background: var(--seen-bg); border-color: var(--seen-border); }
  .movie-poster {
    width: 44px; height: 66px; border-radius: 5px;
    object-fit: cover; background: var(--surface2); flex-shrink: 0;
  }
  .movie-poster-ph {
    width: 44px; height: 66px; border-radius: 5px;
    background: var(--surface2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--text3);
  }
  .movie-body { flex: 1; min-width: 0; }
  .movie-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .movie-meta { display: flex; gap: 8px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
  .movie-year { font-size: 12px; color: var(--text3); }
  .movie-rating { font-size: 12px; color: var(--text2); }
  .platforms { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .ptag {
    font-size: 11px; padding: 2px 8px;
    border-radius: 20px; font-weight: 500;
  }
  .ptag-netflix { background: #E50914; color: #fff; }
  .ptag-disney { background: #113CCF; color: #fff; }
  .ptag-hbo { background: #5E2BE8; color: #fff; }
  .ptag-amazon { background: #00A8E0; color: #fff; }
  .ptag-apple { background: #555; color: #fff; }
  .ptag-paramount { background: #0064FF; color: #fff; }
  .ptag-default { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .movie-note-preview {
    font-size: 12px; color: var(--text2);
    margin-top: 5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-style: italic;
  }
  .movie-actions { display: flex; flex-direction: column; gap: 6px; align-items: center; flex-shrink: 0; margin-top: 18px; }
  .check-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; background: transparent; color: var(--text3);
    font-size: 14px; transition: all 0.15s;
  }
  .check-btn:hover { border-color: var(--seen-check); color: var(--seen-check); }
  .check-btn.seen { background: var(--seen-check); border-color: var(--seen-check); color: #fff; }
  .note-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; background: transparent; color: var(--text3);
    font-size: 13px; transition: all 0.15s;
  }
  .note-btn:hover { border-color: var(--accent); color: var(--accent); }
  .note-btn.has-note { color: var(--accent); border-color: rgba(232,201,109,0.4); background: var(--accent-dim); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 1rem;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 1.5rem;
    width: 100%; max-width: 480px;
  }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; margin-bottom: 4px; }
  .modal-movie { font-size: 13px; color: var(--text2); margin-bottom: 1rem; }
  .modal-textarea {
    width: 100%; min-height: 140px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    resize: vertical; outline: none;
    line-height: 1.6;
  }
  .modal-textarea:focus { border-color: var(--border2); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  .btn-cancel {
    padding: 8px 16px; border-radius: var(--radius-sm);
    background: transparent; border: 1px solid var(--border);
    color: var(--text2); font-size: 14px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-cancel:hover { border-color: var(--border2); }
  .btn-save {
    padding: 8px 16px; border-radius: var(--radius-sm);
    background: var(--accent); border: none;
    color: #0f0f0f; font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-save:hover { opacity: 0.88; }

  /* LISTS SECTION */
  .section-label {
    font-size: 11px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 0.75rem; margin-top: 2rem;
  }
  .saved-lists { display: flex; flex-direction: column; gap: 6px; margin-bottom: 2rem; }
  .list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer;
    transition: border-color 0.15s;
  }
  .list-item:hover { border-color: var(--border2); }
  .list-item-photo {
    width: 36px; height: 36px; border-radius: 50%;
    object-fit: cover; background: var(--surface2); flex-shrink: 0;
  }
  .list-item-name { font-size: 14px; font-weight: 500; }
  .list-item-meta { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .list-item-del {
    margin-left: auto; background: none; border: none;
    color: var(--text3); cursor: pointer; font-size: 16px;
    padding: 4px 6px; border-radius: var(--radius-sm);
    transition: color 0.15s;
  }
  .list-item-del:hover { color: var(--danger); }

  /* MISC */
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }
  .loading { text-align: center; padding: 2rem; color: var(--text2); font-size: 14px; }
  .error { padding: 10px 14px; border-radius: var(--radius-sm); background: rgba(224,90,90,0.1); color: var(--danger); font-size: 13px; margin-bottom: 1rem; border: 1px solid rgba(224,90,90,0.2); }
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--text); padding: 10px 20px; border-radius: 20px;
    font-size: 13px; z-index: 300; opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 500px) {
    header { padding: 0 1rem; }
    main { padding: 1.5rem 1rem; }
    .user-name { display: none; }
  }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">🎬 Movie Checklist</div>
  <div class="auth-sub">Tu filmografía personal. Marcá lo que viste, anotá lo que pensás.</div>
  <button class="btn-google" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Entrar con Google
  </button>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <div class="header-logo">🎬 Movie Checklist</div>
    <div class="header-right">
      <img class="user-avatar" id="userAvatar" src="" alt="">
      <span class="user-name" id="userName"></span>
      <button class="btn-signout" onclick="signOut()">Salir</button>
    </div>
  </header>

  <main>
    <div id="errorMsg"></div>

    <!-- SEARCH -->
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="Buscá un director o actor..." autocomplete="off" />
      <button class="btn-search" onclick="doSearch()">Buscar</button>
    </div>
    <div id="suggestions"></div>

    <!-- PERSON VIEW -->
    <div id="person-view" style="display:none;">
      <div id="person-header"></div>
      <div id="filtersRow" class="filters-row">
        <button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>
        <button class="filter-btn" onclick="setFilter('seen',this)">Vistas</button>
        <button class="filter-btn" onclick="setFilter('unseen',this)">No vistas</button>
        <button class="filter-btn" onclick="setFilter('streaming',this)">En streaming</button>
        <select class="sort-sel" onchange="setSort(this.value)">
          <option value="year_desc">Más recientes</option>
          <option value="year_asc">Más antiguas</option>
          <option value="rating_desc">Mejor calificadas</option>
          <option value="title_asc">A–Z</option>
        </select>
      </div>
      <div id="movieList"></div>
    </div>

    <!-- SAVED LISTS -->
    <div id="saved-section">
      <div class="section-label">Mis filmografías guardadas</div>
      <div id="savedLists" class="saved-lists"><div class="loading">Cargando...</div></div>
    </div>
  </main>
</div>

<!-- NOTE MODAL -->
<div id="noteModal" class="modal-overlay" style="display:none;" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">Mi análisis</div>
    <div class="modal-movie" id="modalMovieTitle"></div>
    <textarea class="modal-textarea" id="noteText" placeholder="¿Qué te pareció? Anotá lo que quieras recordar..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveNote()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAswngzSg6KY8R-KaA-eB8FyVUJjiyegfw",
    authDomain: "movie-check-44bc1.firebaseapp.com",
    projectId: "movie-check-44bc1",
    storageBucket: "movie-check-44bc1.firebasestorage.app",
    messagingSenderId: "678806444530",
    appId: "1:678806444530:web:62163889af6afe5bbdb36b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const TMDB_KEY = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI4YjM2ZTAxMmJkOTY3NTBjZDI1NTFkNTdhYzJlMjAzMiIsIm5iZiI6MTc0OTgzMTA2Mi43MjUsInN1YiI6IjY4NGMzOWZlMWNiOTdmMjAzOGJiYzJjMyIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.Y74mivHnEqE35v2h5_W6cYNhtFfF0y8sOoScnWWOHps';
  const TMDB = 'https://api.themoviedb.org/3';
  const THEAD = { 'Authorization': 'Bearer ' + TMDB_KEY };

  let currentUser = null;
  let allMovies = [];
  let providers = {};
  let seenData = {};
  let notesData = {};
  let currentFilter = 'all';
  let currentSort = 'year_desc';
  let currentPerson = null;
  let currentPersonId = null;
  let noteModalMovieId = null;

  window.signIn = async () => {
    try { await signInWithPopup(auth, provider); }
    catch(e) { showError('No se pudo iniciar sesión: ' + e.message); }
  };
  window.signOut = async () => {
    await fbSignOut(auth);
    location.reload();
  };

  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      document.getElementById('userAvatar').src = user.photoURL || '';
      document.getElementById('userName').textContent = user.displayName?.split(' ')[0] || '';
      loadSavedLists();
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
    }
  });

  async function tmdb(path) {
    const r = await fetch(TMDB + path + (path.includes('?') ? '&' : '?') + 'language=es-AR', { headers: THEAD });
    if (!r.ok) throw new Error('Error ' + r.status);
    return r.json();
  }

  window.doSearch = async () => {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    showError('');
    document.getElementById('suggestions').innerHTML = '<div class="loading">Buscando...</div>';
    try {
      const data = await tmdb('/search/person?query=' + encodeURIComponent(q) + '&include_adult=false');
      const results = (data.results || []).slice(0, 6);
      if (!results.length) {
        document.getElementById('suggestions').innerHTML = '<div class="loading">Sin resultados</div>';
        return;
      }
      document.getElementById('suggestions').innerHTML = results.map(p => {
        const dept = p.known_for_department === 'Directing' ? 'Director/a' : p.known_for_department === 'Acting' ? 'Actor/Actriz' : (p.known_for_department || '');
        const kf = (p.known_for || []).slice(0,2).map(m => m.title || m.name).join(', ');
        return `<div class="suggestion-item" onclick="loadPerson(${p.id},'${esc(p.name)}','${esc(p.profile_path||'')}','${esc(dept)}')">
          ${p.profile_path ? `<img class="sug-avatar" src="https://image.tmdb.org/t/p/w45${p.profile_path}" />` : `<div class="sug-avatar" style="display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text3)">👤</div>`}
          <div style="flex:1;min-width:0;">
            <div class="sug-name">${esc(p.name)}</div>
            ${kf ? `<div class="sug-known">${esc(kf)}</div>` : ''}
          </div>
          <span class="sug-type">${dept}</span>
        </div>`;
      }).join('');
    } catch(e) { showError('Error al buscar. Revisá tu conexión.'); document.getElementById('suggestions').innerHTML = ''; }
  };

  window.loadPerson = async (id, name, photo, dept) => {
    document.getElementById('suggestions').innerHTML = '';
    document.getElementById('saved-section').style.display = 'none';
    document.getElementById('person-view').style.display = 'block';
    document.getElementById('movieList').innerHTML = '<div class="loading">Cargando filmografía...</div>';
    currentPerson = { id, name, photo, dept };
    currentPersonId = String(id);
    showError('');

    try {
      await loadUserData(id);
      const credits = await tmdb('/person/' + id + '/movie_credits');
      const raw = dept === 'Director/a'
        ? (credits.crew || []).filter(m => m.job === 'Director')
        : (credits.cast || []);
      const seen = new Set();
      allMovies = [];
      for (const m of raw) { if (!seen.has(m.id) && m.title) { seen.add(m.id); allMovies.push(m); } }
      allMovies.sort((a,b) => (b.release_date||'').localeCompare(a.release_date||''));

      const avatarHtml = photo
        ? `<img class="person-photo" src="https://image.tmdb.org/t/p/w185${photo}" />`
        : `<div class="person-photo" style="display:flex;align-items:center;justify-content:center;font-size:24px;">👤</div>`;

      document.getElementById('person-header').innerHTML = `
        ${avatarHtml}
        <div>
          <div class="person-name">${esc(name)}</div>
          <div class="person-dept">${dept}</div>
          <div class="person-stats">
            <span class="stat-chip">${allMovies.length} películas</span>
            <span class="stat-chip gold" id="seenChip">0 vistas</span>
          </div>
        </div>`;

      await loadProviders(allMovies.slice(0, 40));
      renderMovies();
      await savePersonMeta(id, name, photo, dept, allMovies.length);
    } catch(e) { showError('Error al cargar. ' + e.message); }
  };

  async function loadUserData(personId) {
    if (!currentUser) return;
    try {
      const ref = doc(db, 'users', currentUser.uid, 'lists', String(personId));
      const snap = await getDoc(ref);
      if (snap.exists()) {
        const d = snap.data();
        seenData = d.seen || {};
        notesData = d.notes || {};
      } else {
        seenData = {}; notesData = {};
      }
    } catch(e) { seenData = {}; notesData = {}; }
  }

  async function saveUserData() {
    if (!currentUser || !currentPersonId) return;
    try {
      const ref = doc(db, 'users', currentUser.uid, 'lists', currentPersonId);
      await setDoc(ref, { seen: seenData, notes: notesData }, { merge: true });
    } catch(e) { showError('No se pudo guardar. ' + e.message); }
  }

  async function savePersonMeta(id, name, photo, dept, total) {
    if (!currentUser) return;
    try {
      const ref = doc(db, 'users', currentUser.uid, 'lists', String(id));
      await setDoc(ref, { personId: id, name, photo, dept, total, updatedAt: Date.now() }, { merge: true });
    } catch(e) {}
  }

  async function loadSavedLists() {
    if (!currentUser) return;
    try {
      const col = collection(db, 'users', currentUser.uid, 'lists');
      const snap = await getDocs(col);
      const lists = [];
      snap.forEach(d => { if (d.data().name) lists.push(d.data()); });
      lists.sort((a,b) => (b.updatedAt||0)-(a.updatedAt||0));
      const el = document.getElementById('savedLists');
      if (!lists.length) { el.innerHTML = '<div class="empty-state">Todavía no guardaste ninguna filmografía.<br>Buscá un director o actor para empezar.</div>'; return; }
      el.innerHTML = lists.map(l => {
        const seenCount = Object.keys(l.seen||{}).length;
        return `<div class="list-item" onclick="loadPerson(${l.personId},'${esc(l.name)}','${esc(l.photo||'')}','${esc(l.dept||'')}')">
          ${l.photo ? `<img class="list-item-photo" src="https://image.tmdb.org/t/p/w45${l.photo}" />` : `<div class="list-item-photo" style="display:flex;align-items:center;justify-content:center;font-size:18px;">👤</div>`}
          <div>
            <div class="list-item-name">${esc(l.name)}</div>
            <div class="list-item-meta">${seenCount} de ${l.total||'?'} vistas · ${l.dept||''}</div>
          </div>
          <button class="list-item-del" onclick="deleteList(event,${l.personId})" title="Eliminar">✕</button>
        </div>`;
      }).join('');
    } catch(e) { document.getElementById('savedLists').innerHTML = '<div class="empty-state">Error al cargar tus listas.</div>'; }
  }

  window.deleteList = async (e, personId) => {
    e.stopPropagation();
    if (!confirm('¿Eliminás esta filmografía de tus listas? Perdés lo que tenías marcado.')) return;
    try {
      await deleteDoc(doc(db, 'users', currentUser.uid, 'lists', String(personId)));
      showToast('Lista eliminada');
      loadSavedLists();
    } catch(e) { showError('No se pudo eliminar.'); }
  };

  async function loadProviders(movies) {
    providers = {};
    await Promise.allSettled(movies.map(m =>
      fetch(TMDB + '/movie/' + m.id + '/watch/providers', { headers: THEAD })
        .then(r => r.json())
        .then(d => { providers[m.id] = parseProviders(d); })
        .catch(() => {})
    ));
  }

  function parseProviders(data) {
    const ar = data?.results?.AR || data?.results?.US || {};
    const all = [...(ar.flatrate||[]), ...(ar.free||[]), ...(ar.ads||[])];
    const seen = new Set();
    return all.filter(p => { if(seen.has(p.provider_id)) return false; seen.add(p.provider_id); return true; }).slice(0,4);
  }

  function ptag(name) {
    const n = name.toLowerCase();
    if (n.includes('netflix')) return 'ptag-netflix';
    if (n.includes('disney')) return 'ptag-disney';
    if (n.includes('max') || n.includes('hbo')) return 'ptag-hbo';
    if (n.includes('prime') || n.includes('amazon')) return 'ptag-amazon';
    if (n.includes('apple')) return 'ptag-apple';
    if (n.includes('paramount')) return 'ptag-paramount';
    return 'ptag-default';
  }

  function renderMovies() {
    let list = [...allMovies];
    if (currentFilter === 'seen') list = list.filter(m => seenData[m.id]);
    if (currentFilter === 'unseen') list = list.filter(m => !seenData[m.id]);
    if (currentFilter === 'streaming') list = list.filter(m => providers[m.id]?.length);
    if (currentSort === 'year_desc') list.sort((a,b) => (b.release_date||'').localeCompare(a.release_date||''));
    if (currentSort === 'year_asc') list.sort((a,b) => (a.release_date||'').localeCompare(b.release_date||''));
    if (currentSort === 'rating_desc') list.sort((a,b) => (b.vote_average||0)-(a.vote_average||0));
    if (currentSort === 'title_asc') list.sort((a,b) => (a.title||'').localeCompare(b.title||''));

    const seenCount = allMovies.filter(m => seenData[m.id]).length;
    const chip = document.getElementById('seenChip');
    if (chip) chip.textContent = seenCount + ' vistas';

    if (!list.length) {
      document.getElementById('movieList').innerHTML = '<div class="empty-state">No hay películas con ese filtro.</div>';
      return;
    }

    document.getElementById('movieList').innerHTML = '<div class="movie-list">' + list.map(m => {
      const year = m.release_date ? m.release_date.substring(0,4) : '—';
      const rating = m.vote_average ? '★ ' + m.vote_average.toFixed(1) : '';
      const isSeen = !!seenData[m.id];
      const note = notesData[m.id] || '';
      const pList = providers[m.id] || [];
      const provHtml = pList.map(p => `<span class="ptag ${ptag(p.provider_name)}">${p.provider_name}</span>`).join('');
      return `<div class="movie-card ${isSeen ? 'seen' : ''}" id="card-${m.id}">
        ${m.poster_path
          ? `<img class="movie-poster" src="https://image.tmdb.org/t/p/w92${m.poster_path}" loading="lazy" alt="${esc(m.title)}" />`
          : `<div class="movie-poster-ph">🎬</div>`}
        <div class="movie-body">
          <div class="movie-title">${esc(m.title)}</div>
          <div class="movie-meta">
            <span class="movie-year">${year}</span>
            ${rating ? `<span class="movie-rating">${rating}</span>` : ''}
          </div>
          ${provHtml ? `<div class="platforms">${provHtml}</div>` : ''}
          ${note ? `<div class="movie-note-preview">${esc(note)}</div>` : ''}
        </div>
        <div class="movie-actions">
          <button class="check-btn ${isSeen ? 'seen' : ''}" onclick="toggleSeen(${m.id})" title="${isSeen ? 'Marcar como no vista' : 'Marcar como vista'}">✓</button>
          <button class="note-btn ${note ? 'has-note' : ''}" onclick="openModal(${m.id},'${esc(m.title)}')" title="Agregar nota">✏</button>
        </div>
      </div>`;
    }).join('') + '</div>';
  }

  window.toggleSeen = async (id) => {
    if (seenData[id]) { delete seenData[id]; } else { seenData[id] = true; }
    renderMovies();
    await saveUserData();
    showToast(seenData[id] ? 'Marcada como vista' : 'Desmarcada');
  };

  window.setFilter = (f, btn) => {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMovies();
  };

  window.setSort = (val) => { currentSort = val; renderMovies(); };

  window.openModal = (movieId, title) => {
    noteModalMovieId = movieId;
    document.getElementById('modalMovieTitle').textContent = title;
    document.getElementById('noteText').value = notesData[movieId] || '';
    document.getElementById('noteModal').style.display = 'flex';
    setTimeout(() => document.getElementById('noteText').focus(), 100);
  };
  window.closeModal = () => { document.getElementById('noteModal').style.display = 'none'; noteModalMovieId = null; };
  window.closeModalOutside = (e) => { if (e.target === document.getElementById('noteModal')) closeModal(); };
  window.saveNote = async () => {
    const text = document.getElementById('noteText').value.trim();
    if (text) { notesData[noteModalMovieId] = text; } else { delete notesData[noteModalMovieId]; }
    closeModal();
    renderMovies();
    await saveUserData();
    showToast('Nota guardada');
  };

  function showError(msg) {
    document.getElementById('errorMsg').innerHTML = msg ? `<div class="error">${esc(msg)}</div>` : '';
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
</body>
</html>
