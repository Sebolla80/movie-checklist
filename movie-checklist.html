<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Movie Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#08080f;--bg2:#0e0e1a;--bg3:#141420;
  --surface:#1a1a2e;--surface2:#22223a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#f2f2ff;--text2:#8888aa;--text3:#44445a;
  --cyan:#00e5ff;--cyan-dim:rgba(0,229,255,0.1);
  --violet:#b44dff;--violet-dim:rgba(180,77,255,0.1);
  --green:#39ff8a;--green-dim:rgba(57,255,138,0.08);--green-b:rgba(57,255,138,0.28);
  --amber:#ffb800;--amber-dim:rgba(255,184,0,0.1);
  --red:#ff4d6d;--r:14px;--r-sm:8px;--r-xs:6px;
  --tab-h:64px;--sidebar-w:220px;
}

html{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;min-height:100vh;display:flex;flex-direction:column;}

/* ── AUTH ── */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;background:radial-gradient(ellipse at 50% 20%,rgba(0,229,255,0.07),transparent 60%);}
.auth-icon{font-size:3.5rem;margin-bottom:.5rem;}
.auth-logo{font-family:'Space Grotesk',sans-serif;font-size:2.2rem;font-weight:700;background:linear-gradient(135deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem;}
.auth-tag{color:var(--text2);font-size:14px;margin-bottom:2.5rem;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:14px 32px;border-radius:var(--r);font-size:15px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;}
.btn-google:hover{border-color:rgba(0,229,255,0.4);box-shadow:0 0 20px rgba(0,229,255,0.08);}

/* ── APP LAYOUT ── */
#app-screen{display:none;min-height:100vh;flex-direction:column;}

/* DESKTOP: sidebar + content */
.app-body{display:flex;flex:1;min-height:0;}

/* ── SIDEBAR (desktop only) ── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;background:linear-gradient(135deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;padding:0 1.25rem 1.5rem;display:flex;align-items:center;gap:8px;}
.sidebar-nav{flex:1;}
.snav-btn{display:flex;align-items:center;gap:10px;padding:10px 1.25rem;font-size:14px;color:var(--text2);cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;width:100%;text-align:left;transition:all .15s;border-left:2px solid transparent;}
.snav-btn:hover{color:var(--text);background:rgba(255,255,255,0.03);}
.snav-btn.active{color:var(--cyan);border-left-color:var(--cyan);background:var(--cyan-dim);}
.snav-btn-wish.active{color:var(--amber);border-left-color:var(--amber);background:var(--amber-dim);}
.snav-icon{font-size:18px;width:22px;text-align:center;}
.sidebar-user{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sidebar-av{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(0,229,255,0.3);flex-shrink:0;}
.sidebar-nm{font-size:13px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-so{font-size:11px;color:var(--text3);background:none;border:1px solid var(--border);cursor:pointer;padding:3px 8px;border-radius:20px;font-family:'Inter',sans-serif;flex-shrink:0;transition:all .15s;}
.btn-so:hover{color:var(--text2);border-color:var(--border2);}

/* ── MAIN CONTENT ── */
.main-content{flex:1;min-width:0;display:flex;flex-direction:column;}

/* DESKTOP top header */
.desktop-topbar{padding:1.25rem 2rem .5rem;border-bottom:1px solid var(--border);background:rgba(8,8,15,0.92);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;}

/* ── SEARCH BAR ── */
.search-wrap{position:relative;max-width:640px;}
.search-type-toggle{display:flex;gap:4px;margin-bottom:8px;}
.stt-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;}
.stt-btn.active{background:var(--cyan-dim);border-color:rgba(0,229,255,0.3);color:var(--cyan);}
.search-row{display:flex;gap:8px;}
.search-inp{flex:1;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:11px 16px;border-radius:var(--r);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:all .2s;}
.search-inp:focus{border-color:rgba(0,229,255,0.4);box-shadow:0 0 0 3px rgba(0,229,255,0.06);}
.search-inp::placeholder{color:var(--text3);}
.btn-srch{background:linear-gradient(135deg,var(--cyan),#0099cc);color:#000;border:none;padding:11px 20px;border-radius:var(--r);font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.btn-srch:hover{opacity:.88;}

/* Suggestions dropdown */
#sug-box{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;z-index:200;box-shadow:0 12px 40px rgba(0,0,0,0.6);max-height:320px;overflow-y:auto;}
.sug-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;}
.sug-item:last-child{border-bottom:none;}
.sug-item:hover{background:var(--surface2);}
.sug-av{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--surface2);flex-shrink:0;}
.sug-poster{width:28px;height:42px;border-radius:4px;object-fit:cover;background:var(--surface2);flex-shrink:0;}
.sug-name{font-size:13px;font-weight:500;}
.sug-sub{font-size:11px;color:var(--text2);}
.sug-type{margin-left:auto;font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:20px;flex-shrink:0;}

/* ── VIEWS ── */
.view{display:none;padding:1.5rem 2rem;}
.view.active{display:block;}

/* ── HOME ── */
.section-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem;margin-top:1.25rem;}
.h-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent;}
.poster-card{flex-shrink:0;width:120px;cursor:pointer;position:relative;transition:transform .15s;}
.poster-card:hover{transform:translateY(-3px);}
.poster-card img,.poster-ph{width:120px;height:180px;border-radius:var(--r-sm);object-fit:cover;background:var(--surface);display:block;}
.poster-ph{display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--text3);}
.poster-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.88),transparent);border-radius:0 0 var(--r-sm) var(--r-sm);padding:12px 8px 8px;}
.poster-title{font-size:11px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.poster-year{font-size:10px;color:rgba(255,255,255,.5);}
.poster-wish-badge{position:absolute;top:6px;left:6px;background:var(--amber);color:#000;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.poster-seen-badge{position:absolute;top:6px;right:6px;background:var(--green);color:#000;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;}
.person-card{flex-shrink:0;width:90px;text-align:center;cursor:pointer;transition:transform .15s;}
.person-card:hover{transform:translateY(-2px);}
.person-card img,.person-ph{width:68px;height:68px;border-radius:50%;object-fit:cover;background:var(--surface);border:2px solid var(--border2);display:block;margin:0 auto 6px;}
.person-ph{display:flex;align-items:center;justify-content:center;font-size:24px;}
.person-card-name{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.home-empty{color:var(--text3);font-size:13px;padding:.5rem 0;}

/* ── PERSON VIEW ── */
.person-back{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;padding:0 0 1rem;transition:color .15s;}
.person-back:hover{color:var(--cyan);}
.person-banner{display:flex;align-items:flex-start;gap:20px;margin-bottom:1.25rem;padding:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);position:relative;overflow:hidden;}
.person-banner::after{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(0,229,255,0.07) 0%,transparent 70%);pointer-events:none;}
.person-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid rgba(0,229,255,0.35);flex-shrink:0;}
.person-photo-ph{width:80px;height:80px;border-radius:50%;background:var(--surface);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;}
.person-meta{flex:1;}
.person-name{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;}
.person-dept{font-size:13px;color:var(--text2);margin-top:3px;}
.person-stats{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.stat-pill{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);}
.stat-pill.c{color:var(--cyan);border-color:rgba(0,229,255,0.3);background:var(--cyan-dim);}
.stat-pill.g{color:var(--green);border-color:var(--green-b);background:var(--green-dim);}
.stat-pill.a{color:var(--amber);border-color:rgba(255,184,0,0.3);background:var(--amber-dim);}
.btn-follow{padding:8px 18px;border-radius:var(--r-sm);border:1px solid rgba(0,229,255,0.4);background:var(--cyan-dim);color:var(--cyan);font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;margin-top:12px;}
.btn-follow:hover{background:rgba(0,229,255,0.18);}
.btn-follow.following{background:var(--green-dim);border-color:var(--green-b);color:var(--green);}
.btn-unfollow{padding:8px 18px;border-radius:var(--r-sm);border:1px solid rgba(255,77,109,0.3);background:rgba(255,77,109,0.06);color:var(--red);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;margin-top:12px;margin-left:8px;}
.btn-unfollow:hover{background:rgba(255,77,109,0.12);}

/* Content tabs */
.ctabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:.75rem;overflow-x:auto;scrollbar-width:none;}
.ctabs::-webkit-scrollbar{display:none;}
.ctab{padding:8px 14px;font-size:13px;font-family:'Inter',sans-serif;background:none;border:none;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
.ctab:hover{color:var(--text);}
.ctab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.ctab-n{font-size:10px;background:var(--surface);padding:1px 6px;border-radius:20px;margin-left:4px;color:var(--text3);}
.ctab.active .ctab-n{background:var(--cyan-dim);color:var(--cyan);}

/* Filters */
.fbar{display:flex;gap:6px;margin-bottom:.75rem;flex-wrap:wrap;align-items:center;}
.fb{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:all .15s;}
.fb:hover{border-color:var(--border2);color:var(--text);}
.fb.active{background:var(--cyan-dim);border-color:rgba(0,229,255,0.35);color:var(--cyan);}
.sort-sel{margin-left:auto;font-size:12px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;outline:none;}

/* Movie list */
.movie-list{display:flex;flex-direction:column;gap:6px;padding-bottom:2rem;}
.mc{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);transition:border-color .15s;}
.mc:hover{border-color:var(--border2);}
.mc.seen{background:rgba(57,255,138,0.025);border-color:rgba(57,255,138,0.15);}
.mc.wished{background:rgba(255,184,0,0.025);border-color:rgba(255,184,0,0.15);}
.mp{width:44px;height:66px;border-radius:5px;object-fit:cover;background:var(--surface);flex-shrink:0;}
.mp-ph{width:44px;height:66px;border-radius:5px;background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text3);}
.mb{flex:1;min-width:0;}
.mt{font-size:14px;font-weight:500;line-height:1.3;}
.mt-orig{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mm{display:flex;gap:8px;align-items:center;margin-top:4px;}
.my{font-size:12px;color:var(--text3);}
.mr{font-size:12px;color:var(--text2);}
.plats{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px;}
.ptag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
.pt-netflix{background:#E50914;color:#fff;}
.pt-disney{background:#113CCF;color:#fff;}
.pt-hbo{background:#5E2BE8;color:#fff;}
.pt-amazon{background:#00A8E0;color:#000;}
.pt-apple{background:#444;color:#fff;}
.pt-paramount{background:#0064FF;color:#fff;}
.pt-default{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.mn-prev{font-size:11px;color:var(--text2);margin-top:4px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.macts{display:flex;flex-direction:column;gap:5px;align-items:center;flex-shrink:0;padding-top:16px;}
.cbtn,.wbtn,.nbtn,.dbtn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;font-size:13px;transition:all .15s;}
.cbtn{color:var(--text3);}.cbtn:hover{border-color:var(--green);color:var(--green);}.cbtn.on{background:var(--green);border-color:var(--green);color:#000;}
.wbtn{color:var(--text3);border-color:var(--border);}.wbtn:hover{border-color:var(--amber);color:var(--amber);}.wbtn.on{background:var(--amber);border-color:var(--amber);color:#000;}
.nbtn{color:var(--text3);border-color:var(--border);}.nbtn:hover{border-color:var(--violet);color:var(--violet);}.nbtn.on{color:var(--violet);border-color:rgba(180,77,255,0.4);background:var(--violet-dim);}
.dbtn{color:var(--text3);border-color:var(--border);font-size:11px;}.dbtn:hover{border-color:var(--red);color:var(--red);}

/* ── MOVIE DETAIL CARD (búsqueda por peli) ── */
.movie-detail-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:1.5rem;margin-top:.5rem;display:flex;gap:1.5rem;align-items:flex-start;}
.mdc-poster{width:120px;height:180px;border-radius:var(--r-sm);object-fit:cover;background:var(--surface);flex-shrink:0;}
.mdc-ph{width:120px;height:180px;border-radius:var(--r-sm);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--text3);flex-shrink:0;}
.mdc-body{flex:1;min-width:0;}
.mdc-title{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;line-height:1.2;}
.mdc-orig{font-size:13px;color:var(--text3);margin-top:3px;}
.mdc-meta{display:flex;gap:10px;align-items:center;margin-top:.5rem;flex-wrap:wrap;}
.mdc-year{font-size:13px;color:var(--text2);}
.mdc-rating{font-size:13px;color:var(--text2);}
.mdc-overview{font-size:13px;color:var(--text2);line-height:1.6;margin-top:.75rem;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
.mdc-director{font-size:12px;color:var(--text3);margin-top:.5rem;}
.mdc-director span{color:var(--cyan);cursor:pointer;}.mdc-director span:hover{text-decoration:underline;}
.mdc-plats{display:flex;gap:5px;flex-wrap:wrap;margin-top:.75rem;}
.mdc-actions{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;}
.mdc-btn{padding:9px 18px;border-radius:var(--r-sm);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);transition:all .15s;display:flex;align-items:center;gap:7px;}
.mdc-btn:hover{border-color:var(--border2);background:var(--surface2);}
.mdc-btn.seen-btn{border-color:var(--green-b);background:var(--green-dim);color:var(--green);}
.mdc-btn.wish-btn{border-color:rgba(255,184,0,0.3);background:var(--amber-dim);color:var(--amber);}
.mdc-btn.note-btn{border-color:rgba(180,77,255,0.3);background:var(--violet-dim);color:var(--violet);}
.mdc-btn.dir-btn{border-color:rgba(0,229,255,0.3);background:var(--cyan-dim);color:var(--cyan);}

/* ── WISHLIST ── */
.wish-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.wish-title{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;}
.wish-count{font-size:13px;color:var(--amber);}
.wish-fi{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:9px 14px;border-radius:var(--r);font-size:13px;font-family:'Inter',sans-serif;outline:none;margin-bottom:.75rem;transition:border-color .2s;}
.wish-fi:focus{border-color:rgba(255,184,0,0.4);}
.wish-fi::placeholder{color:var(--text3);}

/* ── MY LISTS ── */
.lists-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.lists-title{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;}
.lists-fi{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:9px 14px;border-radius:var(--r);font-size:13px;font-family:'Inter',sans-serif;outline:none;margin-bottom:.75rem;transition:border-color .2s;}
.lists-fi:focus{border-color:rgba(0,229,255,0.4);}
.lists-fi::placeholder{color:var(--text3);}
.lists-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding-bottom:2rem;}
.lcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.lcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--violet));opacity:0;transition:opacity .2s;}
.lcard:hover{border-color:rgba(0,229,255,0.2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.lcard:hover::before{opacity:1;}
.lcard-ph{width:48px;height:48px;border-radius:50%;background:var(--surface);border:2px solid var(--border2);margin-bottom:.6rem;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;}
.lcard-ph img{width:100%;height:100%;object-fit:cover;}
.lcard-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.lcard-dept{font-size:11px;color:var(--text3);margin-bottom:.5rem;}
.prog-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--violet));border-radius:2px;}
.prog-lbl{font-size:11px;color:var(--text2);}
.lcard-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px 6px;border-radius:var(--r-xs);transition:color .15s;line-height:1;}
.lcard-del:hover{color:var(--red);}

/* ── MOBILE BOTTOM TAB BAR ── */

.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:1.5rem;width:100%;max-width:480px;box-shadow:0 0 60px rgba(0,229,255,0.06);}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;margin-bottom:4px;}
.modal-movie{font-size:13px;color:var(--text2);margin-bottom:.75rem;}
.modal-ta{width:100%;min-height:130px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:var(--r-sm);font-size:14px;font-family:'Inter',sans-serif;resize:none;outline:none;line-height:1.6;transition:border-color .2s;}
.modal-ta:focus{border-color:rgba(0,229,255,0.4);}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;}
.btn-c{padding:9px 18px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-s{padding:9px 18px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--cyan),#0099cc);border:none;color:#000;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}

/* ── MISC ── */
.empty-st{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;line-height:1.8;}
.empty-ic{font-size:2.5rem;display:block;margin-bottom:.75rem;}
.loading-m{text-align:center;padding:2rem;color:var(--text2);font-size:14px;}
.err-bar{padding:10px 14px;border-radius:var(--r-sm);background:rgba(255,77,109,0.08);color:var(--red);font-size:13px;margin-bottom:.75rem;border:1px solid rgba(255,77,109,0.2);}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 22px;border-radius:20px;font-size:13px;z-index:400;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.toast.show{opacity:1;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .tab-bar{display:flex;}
  .desktop-topbar{padding:.75rem 1rem .5rem;}
  .view{padding:1rem 1rem 80px;}
  .search-wrap{max-width:100%;}
  .lists-grid{grid-template-columns:1fr 1fr;}

  .mdc-poster,.mdc-ph{width:100%;height:200px;}
  .person-banner{flex-direction:column;}
  .main-content{padding-bottom:var(--tab-h);}
}
@media(min-width:769px){
  .app-body{height:100vh;}
  .main-content{overflow-y:auto;}
}

<!-- AUTH -->

<!-- APP -->
<div id="app-screen">

          <button class="ctab active" onclick="setCTab('movies',this)">🎬 Películas<span class="ctab-n" id="cnt-m">0</span></button>

          <button class="fb" onclick="setFilt('seen',this)">Vistas</button>
          <button class="fb" onclick="setFilt('unseen',this)">No vistas</button>
          <button class="fb" onclick="setFilt('wish',this)">Quiero ver</button>
          <button class="fb" onclick="setFilt('streaming',this)">Streaming</button>
          <select class="sort-sel" onchange="setSort(this.value)">
            <option value="year_desc">Recientes</option>
            <option value="year_asc">Antiguas</option>
            <option value="rating_desc">Rating</option>
            <option value="title_asc">A–Z</option>

      <!-- MOVIE DETAIL VIEW -->
      <div class="view" id="view-movie">
        <button class="person-back" onclick="closeMovie()">← Volver a buscar</button>

      <!-- WISHLIST -->
      <div class="view" id="view-wish">
        <div class="wish-header">
          <div class="wish-title">Quiero ver ★</div>
          <div class="wish-count" id="wish-count">0 títulos</div>
        </div>
        <input class="wish-fi" type="text" id="wish-fi" placeholder="Filtrar por título..." oninput="filterWish(this.value)">
        <div id="wish-list" class="movie-list"></div>
      </div>

      <!-- MY LISTS -->
      <div class="view" id="view-lists">
        <div class="lists-header"><div class="lists-title">Mis filmografías</div></div>
        <input class="lists-fi" type="text" id="lfi" placeholder="Filtrar por nombre..." oninput="filterLists(this.value)">
        <div id="lgrid" class="lists-grid"><div class="loading-m">Cargando...</div></div>

    </div>
  </div>

  <!-- MOBILE TAB BAR -->
  <div class="tab-bar">
    <button class="tbtab active" id="tb-home" onclick="showView('home')"><span class="tbtab-icon">🏠</span>Inicio</button>
    <button class="tbtab tbtab-wish" id="tb-wish" onclick="showView('wish')"><span class="tbtab-icon">★</span>Wishlist</button>

  </div>
</div>

<!-- NOTE MODAL -->
<div id="noteModal" class="modal-ov" style="display:none;" onclick="closeModalOut(event)">

      <button class="btn-s" onclick="saveNote()">Guardar</button>

</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut as fbSO,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc,deleteDoc,collection,getDocs}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const FC={apiKey:"AIzaSyAswngzSg6KY8R-KaA-eB8FyVUJjiyegfw",authDomain:"movie-check-44bc1.firebaseapp.com",projectId:"movie-check-44bc1",storageBucket:"movie-check-44bc1.firebasestorage.app",messagingSenderId:"678806444530",appId:"1:678806444530:web:62163889af6afe5bbdb36b"};
const fa=initializeApp(FC);const auth=getAuth(fa);const db=getFirestore(fa);const gp=new GoogleAuthProvider();
const TK='eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJiZjMzZTdiZWE5YjEzNjY1NTUzOGVlMTI2M2RhODhlNCIsIm5iZiI6MTc4MTM3MDg4NS45OSwic3ViIjoiNmEyZDkwMDUzOTU5ZjNlNmJlODk2ZGIwIiwic2NvcGVzIjpbImFwaV9yZWFkIl0sInZlcnNpb24iOjF9.cN30VPfpi0htn7Sq2LNuQrANCoJkghufO7vdrSWfmUE';
const BASE='https://api.themoviedb.org/3';const H={'Authorization':'Bearer '+TK};

let cu=null,movies=[],tvS=[],specs=[],prov={},seen={},notes={},wish={};
let filt='all',srt='year_desc',pid=null,nmid=null,allLists=[],cTab='movies',sTmr=null;
let sType='person'; // 'person' or 'movie'
let allWishItems=[];
let currentPersonIsFollowed=false;
let currentPersonData=null;
// for standalone movie notes/seen (not in a person list)
let standaloneData={seen:{},notes:{},wish:{}};

window.signIn=async()=>{try{await signInWithPopup(auth,gp);}catch(e){showErr('No se pudo iniciar sesión.');}};
window.signOut=async()=>{await fbSO(auth);location.reload();};

onAuthStateChanged(auth,u=>{
  cu=u;
  if(u){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-screen').style.display='flex';
    document.getElementById('app-screen').style.flexDirection='column';
    document.getElementById('app-screen').style.minHeight='100vh';
    document.getElementById('sideAv').src=u.photoURL||'';
    document.getElementById('sideNm').textContent=u.displayName?.split(' ')[0]||'';
    loadLists();loadWishlist();loadStandalone();
  }else{
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});

async function tmdb(p,lang='es-AR'){
  const r=await fetch(BASE+p+(p.includes('?')?'&':'?')+'language='+lang,{headers:H});
  if(!r.ok)throw new Error('Error '+r.status);return r.json();
}

// ── VIEWS ──
window.showView=v=>{
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  // sidebar
  document.querySelectorAll('.snav-btn').forEach(b=>b.classList.remove('active'));
  const sb=document.getElementById('snav-'+v);if(sb)sb.classList.add('active');
  // mobile tabs
  document.querySelectorAll('.tbtab').forEach(b=>b.classList.remove('active'));
  const tb=document.getElementById('tb-'+v);if(tb)tb.classList.add('active');
  if(v==='lists')loadLists();
  if(v==='wish'){loadWishlist();renderWish();}
  if(v==='home')renderHome();
};

// ── SEARCH TYPE TOGGLE ──
window.setSType=(t,btn)=>{
  sType=t;
  document.querySelectorAll('.stt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const si=document.getElementById('si');
  si.placeholder=t==='movie'?'Buscá una película...':'Buscá un director o actor...';
  hideSug();
};

// ── SEARCH ──
const si=document.getElementById('si');
si.addEventListener('input',()=>{
  clearTimeout(sTmr);
  if(si.value.trim().length<3){hideSug();return;}
  sTmr=setTimeout(()=>doSearch(true),350);
});
si.addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(sTmr);doSearch(false);}if(e.key==='Escape')hideSug();});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))hideSug();});
function hideSug(){const s=document.getElementById('sug-box');s.style.display='none';s.innerHTML='';}

window.doSearch=async(auto=false)=>{
  const q=si.value.trim();if(!q)return;
  showErr('');
  const sb=document.getElementById('sug-box');sb.style.display='block';
  sb.innerHTML='<div class="loading-m" style="padding:8px 14px;font-size:13px;">Buscando...</div>';
  try{
    if(sType==='movie'){
      const d=await tmdb('/search/movie?query='+encodeURIComponent(q)+'&include_adult=false');
      const res=(d.results||[]).slice(0,7);
      if(!res.length){sb.innerHTML='<div class="loading-m" style="padding:8px 14px;font-size:13px;">Sin resultados</div>';return;}
      sb.innerHTML=res.map(m=>{
        const yr=m.release_date?m.release_date.substring(0,4):'';
        return`<div class="sug-item" onclick="showMovieDetail(${m.id})">
          ${m.poster_path?`<img class="sug-poster" src="https://image.tmdb.org/t/p/w92${m.poster_path}"/>`:`<div class="sug-poster" style="display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--surface2);">🎬</div>`}
          <div style="flex:1;min-width:0;"><div class="sug-name">${esc(m.title||'')}</div><div class="sug-sub">${esc(m.original_title||'')} ${yr?'· '+yr:''}</div></div>
          <span class="sug-type">Película</span>
        </div>`;
      }).join('');
    } else {
      const d=await tmdb('/search/person?query='+encodeURIComponent(q)+'&include_adult=false');
      const res=(d.results||[]).slice(0,7);
      if(!res.length){sb.innerHTML='<div class="loading-m" style="padding:8px 14px;font-size:13px;">Sin resultados</div>';return;}
      sb.innerHTML=res.map(p=>{
        const dept=p.known_for_department==='Directing'?'Director/a':p.known_for_department==='Acting'?'Actor/Actriz':(p.known_for_department||'');
        const kf=(p.known_for||[]).slice(0,2).map(m=>m.title||m.name).join(', ');
        return`<div class="sug-item" onclick="loadPerson(${p.id},'${esc(p.name)}','${esc(p.profile_path||'')}','${esc(dept)}',false)">
          ${p.profile_path?`<img class="sug-av" src="https://image.tmdb.org/t/p/w45${p.profile_path}"/>`:`<div class="sug-av" style="display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--surface2);">👤</div>`}
          <div style="flex:1;min-width:0;"><div class="sug-name">${esc(p.name)}</div><div class="sug-sub">${esc(kf)}</div></div>
          <span class="sug-type">${dept}</span>
        </div>`;
      }).join('');
    }
  }catch(e){showErr('Error al buscar.');hideSug();}
};

// ── MOVIE DETAIL ──
window.showMovieDetail=async(id)=>{
  hideSug();si.value='';
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-movie').classList.add('active');
  document.getElementById('movie-detail').innerHTML='<div class="loading-m">Cargando...</div>';
  try{
    const[mES,mEN,credits,wprov]=await Promise.all([
      tmdb('/movie/'+id,'es-AR'),
      tmdb('/movie/'+id,'en-US'),
      tmdb('/movie/'+id+'/credits','es-AR'),
      fetch(BASE+'/movie/'+id+'/watch/providers',{headers:H}).then(r=>r.json())
    ]);
    const director=(credits.crew||[]).find(c=>c.job==='Director');
    const provData=parseProv(wprov);
    const provHtml=provData.map(p=>`<span class="ptag ${pc(p.provider_name)}">${p.provider_name}</span>`).join('');
    const titleES=mES.title||mEN.title||'';
    const titleOrig=mEN.original_title||'';
    const showOrig=titleOrig&&titleOrig.toLowerCase()!==titleES.toLowerCase();
    const yr=mES.release_date?mES.release_date.substring(0,4):'';
    const rt=mES.vote_average?'★ '+mES.vote_average.toFixed(1):'';
    const isSeen=standaloneData.seen[id]||false;
    const isWished=standaloneData.wish[id]||false;
    const hasNote=!!standaloneData.notes[id];

    document.getElementById('movie-detail').innerHTML=`
      <div class="movie-detail-card">
        ${mES.poster_path?`<img class="mdc-poster" src="https://image.tmdb.org/t/p/w300${mES.poster_path}" />`:`<div class="mdc-ph">🎬</div>`}
        <div class="mdc-body">
          <div class="mdc-title">${esc(titleES)}</div>
          ${showOrig?`<div class="mdc-orig">${esc(titleOrig)}</div>`:''}
          <div class="mdc-meta">
            ${yr?`<span class="mdc-year">${yr}</span>`:''}
            ${rt?`<span class="mdc-rating">${rt}</span>`:''}
            ${mES.runtime?`<span class="mdc-year">${mES.runtime} min</span>`:''}
          </div>
          ${mES.overview?`<div class="mdc-overview">${esc(mES.overview)}</div>`:''}
          ${director?`<div class="mdc-director">Dirigida por <span onclick="loadPerson(${director.id},'${esc(director.name)}','${esc(director.profile_path||'')}','Director/a',false)">${esc(director.name)}</span></div>`:''}
          ${provHtml?`<div class="mdc-plats">${provHtml}</div>`:''}
          <div class="mdc-actions">
            <button class="mdc-btn ${isSeen?'seen-btn':''}" onclick="toggleStandaloneSeen(${id},'${esc(titleES)}','${esc(mES.poster_path||'')}','${esc(mES.release_date||'')}',${mES.vote_average||0})">
              ${isSeen?'✓ Vista':'✓ Marcar como vista'}
            </button>
            <button class="mdc-btn ${isWished?'wish-btn':''}" onclick="toggleStandaloneWish(${id},'${esc(titleES)}','${esc(mES.poster_path||'')}','${esc(mES.release_date||'')}',${mES.vote_average||0})">
              ${isWished?'★ En wishlist':'★ Agregar a wishlist'}
            </button>
            ${director?`<button class="mdc-btn dir-btn" onclick="loadPerson(${director.id},'${esc(director.name)}','${esc(director.profile_path||'')}','Director/a',false)">🎬 Ver filmografía de ${esc(director.name)}</button>`:''}
            <button class="mdc-btn note-btn ${hasNote?'on':''}" onclick="oModal('standalone_${id}','${esc(titleES)}')">✏ ${hasNote?'Editar nota':'Agregar nota'}</button>
          </div>
        </div>
      </div>`;
  }catch(e){document.getElementById('movie-detail').innerHTML=`<div class="err-bar">Error al cargar la película.</div>`;}
};

window.closeMovie=()=>{
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-home').classList.add('active');
  document.querySelectorAll('.snav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('snav-home').classList.add('active');
};

async function loadStandalone(){
  if(!cu)return;
  try{
    const s=await getDoc(doc(db,'users',cu.uid,'standalone','movies'));
    if(s.exists()){const d=s.data();standaloneData.seen=d.seen||{};standaloneData.notes=d.notes||{};standaloneData.wish=d.wish||{};}
  }catch(e){}
}
async function saveStandalone(){
  if(!cu)return;
  try{await setDoc(doc(db,'users',cu.uid,'standalone','movies'),standaloneData,{merge:true});}catch(e){}
}

window.toggleStandaloneSeen=async(id,title,poster,date,rating)=>{
  if(standaloneData.seen[id]){delete standaloneData.seen[id];}
  else{standaloneData.seen[id]=true;if(standaloneData.wish[id])delete standaloneData.wish[id];}
  await saveStandalone();await loadWishlist();
  showMovieDetail(id);showToast(standaloneData.seen[id]?'Marcada como vista ✓':'Desmarcada');
};

window.toggleStandaloneWish=async(id,title,poster,date,rating)=>{
  if(standaloneData.wish[id]){delete standaloneData.wish[id];}
  else{standaloneData.wish[id]={id,title,poster_path:poster,release_date:date,vote_average:rating,_listName:'Búsqueda directa',addedAt:Date.now()};}
  await saveStandalone();await loadWishlist();
  showMovieDetail(id);showToast(standaloneData.wish[id]?'Agregada a wishlist ★':'Quitada de wishlist');
};

// ── PERSON VIEW ──
window.loadPerson=async(id,name,photo,dept,fromList=false)=>{
  hideSug();si.value='';
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-person').classList.add('active');
  document.getElementById('mlist').innerHTML='<div class="loading-m">Cargando filmografía...</div>';
  pid=String(id);showErr('');cTab='movies';filt='all';
  document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.ctab').classList.add('active');
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  document.querySelector('.fb').classList.add('active');
  currentPersonData={id,name,photo,dept};

  // Check if already followed
  let isFollowed=false;
  try{const s=await getDoc(doc(db,'users',cu.uid,'lists',String(id)));isFollowed=s.exists()&&!!s.data().name;}catch(e){}
  currentPersonIsFollowed=isFollowed;

  try{
    await loadUD(id);
    const[crA,tvA,crO,tvO]=await Promise.all([
      tmdb('/person/'+id+'/movie_credits','es-AR'),
      tmdb('/person/'+id+'/tv_credits','es-AR'),
      tmdb('/person/'+id+'/movie_credits','en-US'),
      tmdb('/person/'+id+'/tv_credits','en-US')
    ]);
    const oMM={};[...(crO.cast||[]),...(crO.crew||[])].forEach(m=>{if(m.id)oMM[m.id]=m.original_title||m.title||'';});
    const oTM={};[...(tvO.cast||[]),...(tvO.crew||[])].forEach(m=>{if(m.id)oTM[m.id]=m.original_name||m.name||'';});
    const isD=dept==='Director/a';
    const rawM=isD?(crA.crew||[]).filter(m=>m.job==='Director'):(crA.cast||[]);
    const rawT=isD?(tvA.crew||[]).filter(m=>m.job==='Director'):(tvA.cast||[]);
    const ms=new Set();movies=[];
    for(const m of rawM){if(!ms.has(m.id)&&m.title){ms.add(m.id);m._orig=oMM[m.id]||'';movies.push(m);}}
    movies.sort((a,b)=>(b.release_date||'').localeCompare(a.release_date||''));
    const ts=new Set();tvS=[];specs=[];
    for(const m of rawT){if(!ts.has(m.id)&&m.name){ts.add(m.id);m._orig=oTM[m.id]||'';m._title=m.name;m._date=m.first_air_date||'';m._poster=m.poster_path||'';if((m.episode_count||99)<=2)specs.push(m);else tvS.push(m);}}
    tvS.sort((a,b)=>(b._date||'').localeCompare(a._date||''));
    specs.sort((a,b)=>(b._date||'').localeCompare(a._date||''));
    document.getElementById('cnt-m').textContent=movies.length;
    document.getElementById('cnt-tv').textContent=tvS.length;
    document.getElementById('cnt-sp').textContent=specs.length;
    renderPersonBanner(name,photo,dept);
    await loadProv([...movies,...tvS,...specs].slice(0,60));
    renderMovies();
    if(isFollowed)await saveMeta(id,name,photo,dept,movies.length);
  }catch(e){showErr('Error al cargar. '+e.message);}
};

function renderPersonBanner(name,photo,dept){
  const ph=photo?`<img class="person-photo" src="https://image.tmdb.org/t/p/w185${photo}"/>`:`<div class="person-photo-ph">👤</div>`;
  const sc=Object.keys(seen).length;const wc=Object.keys(wish).length;
  const followBtn=currentPersonIsFollowed
    ?`<button class="btn-follow following" onclick="unfollowPerson()">✓ En mis listas</button>`
    :`<button class="btn-follow" onclick="followPerson()">+ Agregar a mis listas</button>`;
  const delBtn=currentPersonIsFollowed
    ?`<button class="btn-unfollow" onclick="unfollowPerson()">✕ Dejar de seguir</button>`:'';
  document.getElementById('person-banner').innerHTML=`
    ${ph}
    <div class="person-meta">
      <div class="person-name">${esc(name)}</div>
      <div class="person-dept">${dept}</div>
      <div class="person-stats">
        <span class="stat-pill c">${movies.length+tvS.length+specs.length} títulos</span>
        <span class="stat-pill g" id="seenChip">${sc} vistos</span>
        <span class="stat-pill a" id="wishChip">${wc} ★</span>
      </div>
      <div style="display:flex;gap:0;flex-wrap:wrap;">${followBtn}${delBtn}</div>
    </div>`;
}

window.followPerson=async()=>{
  if(!cu||!currentPersonData)return;
  const{id,name,photo,dept}=currentPersonData;
  currentPersonIsFollowed=true;
  await saveMeta(id,name,photo,dept,movies.length);
  renderPersonBanner(name,photo,dept);
  showToast('Agregado a tus listas ✓');loadLists();
};

window.unfollowPerson=async()=>{
  if(!cu||!currentPersonData)return;
  if(!confirm('¿Dejás de seguir a '+currentPersonData.name+'? Perdés lo que tenías marcado.'))return;
  await deleteDoc(doc(db,'users',cu.uid,'lists',String(currentPersonData.id)));
  currentPersonIsFollowed=false;seen={};notes={};wish={};
  renderPersonBanner(currentPersonData.name,currentPersonData.photo,currentPersonData.dept);
  renderMovies();showToast('Dejaste de seguir');loadLists();
};

function closePerson(){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));

  document.querySelectorAll('.snav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('snav-home').classList.add('active');
  document.querySelectorAll('.tbtab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tb-home').classList.add('active');

}
window.closePerson=closePerson;

// ── USER DATA ──
async function loadUD(id){
  if(!cu)return;
  try{const s=await getDoc(doc(db,'users',cu.uid,'lists',String(id)));
    if(s.exists()){const d=s.data();seen=d.seen||{};notes=d.notes||{};wish=d.wish||{};}
    else{seen={};notes={};wish={};}
  }catch(e){seen={};notes={};wish={};}
}
async function saveUD(){
  if(!cu||!pid)return;
  if(!currentPersonIsFollowed)return; // solo guarda si está en seguidos
  try{await setDoc(doc(db,'users',cu.uid,'lists',pid),{seen,notes,wish},{merge:true});}catch(e){showErr('No se pudo guardar.');}
}
async function saveMeta(id,name,photo,dept,total){
  if(!cu)return;
  try{await setDoc(doc(db,'users',cu.uid,'lists',String(id)),{personId:id,name,photo,dept,total,updatedAt:Date.now()},{merge:true});}catch(e){}
}

// ── WISHLIST ──
async function loadWishlist(){
  if(!cu)return;
  try{
    const s=await getDocs(collection(db,'users',cu.uid,'lists'));
    allWishItems=[];
    s.forEach(d=>{
      const data=d.data();
      Object.keys(data.wish||{}).forEach(mid=>{
        const item=data.wish[mid];
        if(item&&item.title)allWishItems.push({...item,_listName:data.name,_listId:d.id});
      });
    });
    // Also include standalone wish
    Object.keys(standaloneData.wish||{}).forEach(mid=>{
      const item=standaloneData.wish[mid];
      if(item&&item.title)allWishItems.push({...item,_listName:'Búsqueda directa',_listId:'standalone'});
    });
    allWishItems.sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
    document.getElementById('wish-count').textContent=allWishItems.length+' títulos';
  }catch(e){}
}

function renderWish(q=''){
  const list=q?allWishItems.filter(i=>(i.title||'').toLowerCase().includes(q.toLowerCase())):allWishItems;
  const el=document.getElementById('wish-list');
  if(!list.length){el.innerHTML='<div class="empty-st"><span class="empty-ic">★</span>Tu wishlist está vacía.<br>Marcá películas con ★ en cualquier filmografía.</div>';return;}
  el.innerHTML=list.map(m=>{
    const yr=m.release_date?m.release_date.substring(0,4):'';
    const rt=m.vote_average?'★ '+parseFloat(m.vote_average).toFixed(1):'';
    return`<div class="mc wished">
      ${m.poster_path?`<img class="mp" src="https://image.tmdb.org/t/p/w92${m.poster_path}" loading="lazy"/>`:`<div class="mp-ph">🎬</div>`}
      <div class="mb">
        <div class="mt">${esc(m.title||'')}</div>
        <div class="mm">${yr?`<span class="my">${yr}</span>`:''}${rt?`<span class="mr">${rt}</span>`:''}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;">de ${esc(m._listName||'')}</div>
      </div>
      <div class="macts" style="padding-top:14px;">
        <button class="wbtn on" onclick="removeWish('${m._listId}',${m.id})" title="Quitar de wishlist">★</button>
      </div>
    </div>`;
  }).join('');
}
window.filterWish=q=>renderWish(q);

window.removeWish=async(listId,movieId)=>{
  if(!cu)return;
  try{
    if(listId==='standalone'){
      delete standaloneData.wish[movieId];
      await saveStandalone();
    }else{
      const ref=doc(db,'users',cu.uid,'lists',String(listId));
      const s=await getDoc(ref);
      if(s.exists()){const d=s.data();const w=d.wish||{};delete w[movieId];await setDoc(ref,{wish:w},{merge:true});}
    }
    await loadWishlist();renderWish(document.getElementById('wish-fi').value);
    showToast('Quitado de wishlist');
  }catch(e){showErr('Error.');}
};

// ── HOME ──
async function renderHome(){
  if(!cu)return;
  try{
    const s=await getDocs(collection(db,'users',cu.uid,'lists'));
    const lists=[];s.forEach(d=>{if(d.data().name)lists.push(d.data());});
    lists.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
    const rp=document.getElementById('recentPersons');
    if(!lists.length){rp.innerHTML='<div class="home-empty">Buscá un director o actor y agregalo a tus listas</div>';}
    else{rp.innerHTML=lists.slice(0,12).map(l=>`
      <div class="person-card" onclick="loadPerson(${l.personId},'${esc(l.name)}','${esc(l.photo||'')}','${esc(l.dept||'')}',true)">
        ${l.photo?`<img src="https://image.tmdb.org/t/p/w92${l.photo}"/>`:`<div class="person-ph">👤</div>`}
        <div class="person-card-name">${esc(l.name)}</div>
      </div>`).join('');}

    if(!wishItems.length){hw.innerHTML='<div class="home-empty">Agregá películas a tu wishlist con ★</div>';}
    else{hw.innerHTML=wishItems.map(m=>`
      <div class="poster-card">
        ${m.poster_path?`<img src="https://image.tmdb.org/t/p/w154${m.poster_path}" loading="lazy"/>`:`<div class="poster-ph">🎬</div>`}
        <div class="poster-overlay"><div class="poster-title">${esc(m.title||'')}</div>${m.release_date?`<div class="poster-year">${m.release_date.substring(0,4)}</div>`:''}</div>
        <div class="poster-wish-badge">★</div>
      </div>`).join('');}
  }catch(e){}
}

// ── PROVIDERS ──
async function loadProv(ms){
  prov={};
  await Promise.allSettled(ms.map(m=>{
    const isTV=!m.title;
    const ep=isTV?'/tv/'+m.id+'/watch/providers':'/movie/'+m.id+'/watch/providers';
    return fetch(BASE+ep,{headers:H}).then(r=>r.json()).then(d=>{prov[m.id]=parseProv(d);}).catch(()=>{});
  }));
}
function parseProv(d){
  const ar=d?.results?.AR||d?.results?.US||{};
  const all=[...(ar.flatrate||[]),...(ar.free||[]),...(ar.ads||[])];
  const s=new Set();
  return all.filter(p=>{if(s.has(p.provider_id))return false;s.add(p.provider_id);return true;}).slice(0,4);
}
function pc(n){const l=n.toLowerCase();if(l.includes('netflix'))return'pt-netflix';if(l.includes('disney'))return'pt-disney';if(l.includes('max')||l.includes('hbo'))return'pt-hbo';if(l.includes('prime')||l.includes('amazon'))return'pt-amazon';if(l.includes('apple'))return'pt-apple';if(l.includes('paramount'))return'pt-paramount';return'pt-default';}

// ── RENDER MOVIES ──
function getCurList(){if(cTab==='tv')return tvS;if(cTab==='special')return specs;return movies;}
function renderMovies(){
  let list=[...getCurList()];const isTV=cTab!=='movies';
  if(filt==='seen')list=list.filter(m=>seen[m.id]);
  if(filt==='unseen')list=list.filter(m=>!seen[m.id]&&!wish[m.id]);
  if(filt==='wish')list=list.filter(m=>wish[m.id]);
  if(filt==='streaming')list=list.filter(m=>prov[m.id]?.length);
  const dk=isTV?'_date':'release_date';const tk=isTV?'_title':'title';
  if(srt==='year_desc')list.sort((a,b)=>(b[dk]||'').localeCompare(a[dk]||''));
  if(srt==='year_asc')list.sort((a,b)=>(a[dk]||'').localeCompare(b[dk]||''));
  if(srt==='rating_desc')list.sort((a,b)=>(b.vote_average||0)-(a.vote_average||0));
  if(srt==='title_asc')list.sort((a,b)=>(a[tk]||'').localeCompare(b[tk]||''));
  const allC=[...movies,...tvS,...specs];
  const sc=allC.filter(m=>seen[m.id]).length;const wc=allC.filter(m=>wish[m.id]).length;
  const ch=document.getElementById('seenChip');if(ch)ch.textContent=sc+' vistos';
  const wh=document.getElementById('wishChip');if(wh)wh.textContent=wc+' ★';
  if(!list.length){document.getElementById('mlist').innerHTML='<div class="empty-st"><span class="empty-ic">🔍</span>No hay títulos con ese filtro.</div>';return;}
  document.getElementById('mlist').innerHTML=list.map(m=>{
    const title=isTV?(m._title||m.name||''):(m.title||'');
    const orig=m._orig||'';const showOrig=orig&&orig.toLowerCase()!==title.toLowerCase();
    const poster=isTV?(m._poster||m.poster_path||''):(m.poster_path||'');
    const dateStr=isTV?(m._date||''):(m.release_date||'');
    const yr=dateStr?dateStr.substring(0,4):'—';
    const rt=m.vote_average?'★ '+m.vote_average.toFixed(1):'';
    const sv=!!seen[m.id];const wished=!!wish[m.id];const nt=notes[m.id]||'';
    const pl=prov[m.id]||[];
    const ph=pl.map(p=>`<span class="ptag ${pc(p.provider_name)}">${p.provider_name}</span>`).join('');
    return`<div class="mc ${sv?'seen':wished?'wished':''}">
      ${poster?`<img class="mp" src="https://image.tmdb.org/t/p/w92${poster}" loading="lazy" alt="${esc(title)}"/>`:`<div class="mp-ph">${isTV?'📺':'🎬'}</div>`}
      <div class="mb">
        <div class="mt">${esc(title)}</div>
        ${showOrig?`<div class="mt-orig">${esc(orig)}</div>`:''}
        <div class="mm"><span class="my">${yr}</span>${rt?`<span class="mr">${rt}</span>`:''}</div>
        ${ph?`<div class="plats">${ph}</div>`:''}
        ${nt?`<div class="mn-prev">${esc(nt)}</div>`:''}
      </div>
      <div class="macts">
        <button class="cbtn ${sv?'on':''}" onclick="tSeen(${m.id})" title="${sv?'Desmarcar':'Marcar como visto'}">✓</button>
        <button class="wbtn ${wished?'on':''}" onclick="tWish(${m.id},'${esc(title)}','${esc(poster)}','${esc(dateStr)}',${m.vote_average||0})" title="${wished?'Quitar de wishlist':'Agregar a wishlist'}">★</button>
        <button class="nbtn ${nt?'on':''}" onclick="oModal(${m.id},'${esc(title)}')" title="Nota">✏</button>
      </div>
    </div>`;
  }).join('');
}

window.tSeen=async id=>{
  if(seen[id]){delete seen[id];}else{seen[id]=true;if(wish[id])delete wish[id];}
  if(currentPersonIsFollowed){renderMovies();await saveUD();}
  else{seen[id]?showToast('Agregá esta filmografía a tus listas para guardar el progreso'):null;renderMovies();}
  showToast(seen[id]?'Marcado como visto ✓':'Desmarcado');
};
window.tWish=async(id,title,poster,date,rating)=>{
  if(wish[id]){delete wish[id];}
  else{wish[id]={id,title,poster_path:poster,release_date:date,vote_average:rating,addedAt:Date.now()};}
  renderMovies();
  if(currentPersonIsFollowed){await saveUD();await loadWishlist();}
  showToast(wish[id]?'Agregado a wishlist ★':'Quitado de wishlist');
};

window.setCTab=(tab,btn)=>{cTab=tab;filt='all';document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));document.querySelector('.fb').classList.add('active');renderMovies();};
window.setFilt=(f,btn)=>{filt=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderMovies();};
window.setSort=v=>{srt=v;renderMovies();};

// ── MY LISTS ──
async function loadLists(){
  if(!cu)return;
  try{
    const s=await getDocs(collection(db,'users',cu.uid,'lists'));
    allLists=[];s.forEach(d=>{if(d.data().name)allLists.push(d.data());});
    allLists.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
    renderLists(allLists);
  }catch(e){document.getElementById('lgrid').innerHTML='<div class="empty-st">Error al cargar.</div>';}
}
function renderLists(list){
  const el=document.getElementById('lgrid');
  if(!list.length){el.innerHTML='<div class="empty-st" style="grid-column:1/-1"><span class="empty-ic">🎬</span>Todavía no seguís ninguna filmografía.<br>Buscá un director o actor y agregalo con el botón.</div>';return;}
  el.innerHTML=list.map(l=>{
    const sc=Object.keys(l.seen||{}).length;const tot=l.total||1;const pct=Math.round((sc/tot)*100);
    return`<div class="lcard" onclick="loadPerson(${l.personId},'${esc(l.name)}','${esc(l.photo||'')}','${esc(l.dept||'')}',true)">
      <button class="lcard-del" onclick="delList(event,${l.personId})" title="Dejar de seguir">✕</button>
      <div class="lcard-ph">${l.photo?`<img src="https://image.tmdb.org/t/p/w92${l.photo}"/>`:'👤'}</div>
      <div class="lcard-name">${esc(l.name)}</div>
      <div class="lcard-dept">${esc(l.dept||'')}</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-lbl">${sc}/${tot} vistos · ${pct}%</div>
    </div>`;
  }).join('');
}
window.filterLists=q=>renderLists(allLists.filter(l=>l.name.toLowerCase().includes(q.toLowerCase())));
window.delList=async(e,id)=>{
  e.stopPropagation();
  if(!confirm('¿Dejás de seguir esta filmografía? Perdés tu progreso.'))return;
  try{await deleteDoc(doc(db,'users',cu.uid,'lists',String(id)));showToast('Eliminado');loadLists();renderHome();}
  catch(e){showErr('No se pudo eliminar.');}
};

// ── MODAL ──
window.oModal=(id,title)=>{
  nmid=id;
  document.getElementById('mmt').textContent=title;
  // handle standalone notes
  if(String(id).startsWith('standalone_')){
    const rid=parseInt(String(id).replace('standalone_',''));
    document.getElementById('mta').value=standaloneData.notes[rid]||'';
  } else {
    document.getElementById('mta').value=notes[id]||'';
  }
  document.getElementById('noteModal').style.display='flex';
  setTimeout(()=>document.getElementById('mta').focus(),100);
};
window.closeModal=()=>{document.getElementById('noteModal').style.display='none';nmid=null;};
window.closeModalOut=e=>{if(e.target===document.getElementById('noteModal'))closeModal();};
window.saveNote=async()=>{
  const t=document.getElementById('mta').value.trim();
  const idStr=String(nmid);
  if(idStr.startsWith('standalone_')){
    const rid=parseInt(idStr.replace('standalone_',''));
    if(t){standaloneData.notes[rid]=t;}else{delete standaloneData.notes[rid];}
    await saveStandalone();
    closeModal();showMovieDetail(rid);
  } else {
    if(t){notes[nmid]=t;}else{delete notes[nmid];}
    closeModal();renderMovies();
    if(currentPersonIsFollowed)await saveUD();
  }
  showToast('Nota guardada ✓');
};

function showErr(m){document.getElementById('errMsg').innerHTML=m?`<div class="err-bar">${esc(m)}</div>`:'';}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
</script>
