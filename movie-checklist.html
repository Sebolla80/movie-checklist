<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diario de Entreno · Sebo</title>
<script src="https://cdn.tailwindcss.com"><\/script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"><\/script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:'Inter',sans-serif;background:#F5F5F0;color:#16181D}
body{display:flex}
#sidebar{width:220px;min-height:100vh;background:#16181D;color:#F5F5F0;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
#main{flex:1;min-width:0;overflow-y:auto;height:100vh}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;margin:2px 8px;cursor:pointer;font-size:14px;font-weight:500;transition:background .15s,color .15s;color:#8A8F99}
.nav-item:hover{background:rgba(255,255,255,.07);color:#F5F5F0}
.nav-item.active{background:#D6FF3D;color:#16181D}
.nav-icon{font-size:18px;width:22px;text-align:center}
.section{display:none;padding:32px;max-width:900px}
.section.active{display:block}
.chip{padding:6px 14px;border-radius:99px;border:1px solid #E2E2DC;background:#fff;font-size:13px;cursor:pointer;transition:background .12s,color .12s,border-color .12s;font-family:'Inter',sans-serif}
.chip[aria-pressed="true"]{background:#16181D;color:#F5F5F0;border-color:#16181D}
.stat-card{background:#fff;border:1px solid #E2E2DC;border-radius:16px;padding:20px}
.pg-bar{height:8px;border-radius:99px;background:#E2E2DC;overflow:hidden}
.pg-fill{height:100%;border-radius:99px;transition:width .4s ease}
input,select,textarea{width:100%;padding:9px 12px;border-radius:10px;border:1px solid #E2E2DC;background:#F5F5F0;font-family:'Inter',sans-serif;font-size:14px;color:#16181D;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#16181D}
#chatMessages{height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:20px}
.msg-u{align-self:flex-end;background:#16181D;color:#F5F5F0;padding:10px 14px;border-radius:14px 14px 4px 14px;max-width:80%;font-size:14px;line-height:1.5}
.msg-a{align-self:flex-start;background:#fff;border:1px solid #E2E2DC;padding:10px 14px;border-radius:14px 14px 14px 4px;max-width:85%;font-size:14px;line-height:1.6}
.msg-typing{color:#8A8F99;font-style:italic}
.h1{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px}
.h2{font-family:'Oswald',sans-serif;font-size:19px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin:28px 0 12px}
.label{font-size:13px;font-weight:600;display:block;margin-bottom:6px}
.muted{color:#8A8F99;font-size:12px}
.bignum{font-family:'Oswald',sans-serif;font-size:52px;font-weight:700;line-height:1}
@media(max-width:768px){
  body{flex-direction:column}
  #sidebar{width:100%;min-height:auto;height:auto;flex-direction:row;position:sticky;top:0;z-index:50;overflow-x:auto;padding:6px 4px}
  .sidebar-logo{display:none}
  .nav-item{flex-direction:column;gap:2px;font-size:10px;padding:7px 10px;border-radius:8px;min-width:56px;text-align:center}
  .nav-icon{font-size:20px;width:auto}
  #main{height:calc(100vh - 64px);overflow-y:auto}
  .section{padding:16px}
  .grid2{grid-template-columns:1fr !important}
}
</style>
</head>
<body>

<nav id="sidebar">
  <div class="sidebar-logo" style="padding:24px 20px 16px">
    <div style="font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:.05em;color:#D6FF3D">ENTRENO</div>
    <div style="font-size:12px;color:#8A8F99;margin-top:2px">· Sebo</div>
  </div>
  <div style="flex:1;padding:8px 0">
    <div class="nav-item active" data-sec="registro"><span class="nav-icon">📝</span><span>Registro</span></div>
    <div class="nav-item" data-sec="dashboard"><span class="nav-icon">📊</span><span>Dashboard</span></div>
    <div class="nav-item" data-sec="perfil"><span class="nav-icon">👤</span><span>Perfil</span></div>
    <div class="nav-item" data-sec="trainer"><span class="nav-icon">🤖</span><span>Trainer IA</span></div>
    <div class="nav-item" data-sec="stats"><span class="nav-icon">📈</span><span>Estadísticas</span></div>
  </div>
  <div class="sidebar-logo" style="padding:16px;font-size:11px;color:#4a4f59">v2.0</div>
</nav>

<div id="main">

<!-- REGISTRO -->
<section id="sec-registro" class="section active">
  <p class="h1">Registrar Entreno</p>
  <p id="todayLabel" style="color:#8A8F99;font-size:14px;margin-bottom:24px"></p>
  <div style="background:#fff;border:1px solid #E2E2DC;border-radius:20px;padding:28px;display:flex;flex-direction:column;gap:20px;max-width:640px">
    <div><label class="label">Fecha</label><input id="fecha" type="date" style="max-width:200px"></div>
    <div><p class="label">Músculos trabajados</p><div id="muscleChips"></div></div>
    <div><p class="label">Tipo de trabajo</p><div id="typeChips" style="display:flex;flex-wrap:wrap;gap:8px"></div></div>
    <div><label class="label">Notas <span style="color:#8A8F99;font-weight:400">(opcional)</span></label><textarea id="notas" rows="3" placeholder="Pesos, series, sensaciones…" style="resize:none"></textarea></div>
    <p id="formMsg" style="color:#FF6B4A;font-size:13px;display:none"></p>
    <button id="saveBtn" style="font-family:'Oswald',sans-serif;font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:.05em;background:#D6FF3D;color:#16181D;border:none;border-radius:12px;padding:14px;cursor:pointer">Guardar Entreno</button>
  </div>
  <p class="h2">Historial</p>
  <div style="background:#fff;border:1px solid #E2E2DC;border-radius:16px;overflow:hidden;max-width:900px">
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="background:#F5F5F0;color:#8A8F99;font-size:11px;text-transform:uppercase;letter-spacing:.05em">
        <th style="text-align:left;padding:10px 16px;font-weight:600">Fecha</th>
        <th style="text-align:left;padding:10px 16px;font-weight:600">Músculos</th>
        <th style="text-align:left;padding:10px 16px;font-weight:600">Tipo</th>
        <th style="text-align:left;padding:10px 16px;font-weight:600">Notas</th>
        <th></th>
      </tr></thead>
      <tbody id="historyBody"></tbody>
    </table>
    <div id="historyEmpty" style="padding:36px;text-align:center;color:#8A8F99;font-size:14px">Todavía no hay entrenos. ¡Registrá el primero! 💪</div>
  </div>
</section>

<!-- DASHBOARD -->
<section id="sec-dashboard" class="section" style="max-width:1100px">
  <p class="h1">Dashboard</p>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:22px" class="grid5">
    <div class="stat-card" style="background:#16181D;color:#F5F5F0">
      <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:4px">Este mes</p>
      <p id="d-mes" class="bignum" style="color:#D6FF3D">0</p>
      <p style="font-size:12px;margin-top:4px">días entrenados</p>
      <p id="d-delta" class="muted" style="margin-top:2px"></p>
    </div>
    <div class="stat-card">
      <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:4px">Racha</p>
      <p id="d-racha" class="bignum">0</p>
      <p style="font-size:12px;margin-top:4px">días seguidos</p>
    </div>
    <div class="stat-card">
      <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:4px">Total</p>
      <p id="d-total" class="bignum">0</p>
      <p style="font-size:12px;margin-top:4px">entrenos</p>
    </div>
    <div class="stat-card">
      <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:4px">Músculo top</p>
      <p id="d-topmu" style="font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;line-height:1.2;margin-top:6px">—</p>
    </div>
    <div class="stat-card">
      <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:4px">Último entreno</p>
      <p id="d-ultimo" style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;line-height:1.3;margin-top:6px">—</p>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px" class="grid2">
    <div class="stat-card"><p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:14px">Distribución por músculo</p><div style="position:relative;height:260px"><canvas id="muscleChart"></canvas></div></div>
    <div class="stat-card"><p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:14px">Tipo de trabajo</p><div style="position:relative;height:260px"><canvas id="typeChart"></canvas></div></div>
  </div>
  <div class="stat-card" style="margin-bottom:18px"><p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:14px">Frecuencia semanal — últimas 8 semanas</p><div style="position:relative;height:200px"><canvas id="weekChart"></canvas></div></div>
  <div class="stat-card"><p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:14px">Balance muscular</p><div id="muscleBalance" style="display:flex;flex-direction:column;gap:10px"></div></div>
</section>

<!-- PERFIL -->
<section id="sec-perfil" class="section" style="max-width:680px">
  <p class="h1">Mi Perfil</p>
  <p style="color:#8A8F99;font-size:14px;margin-bottom:24px">Tus datos se usan para personalizar el análisis del Trainer IA.</p>
  <div style="background:#fff;border:1px solid #E2E2DC;border-radius:20px;padding:28px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px" class="grid2">
      <div><label class="label">Nombre</label><input type="text" id="p-nombre" placeholder="Sebo"></div>
      <div><label class="label">Edad</label><input type="number" id="p-edad" placeholder="35" min="10" max="100"></div>
      <div><label class="label">Peso (kg)</label><input type="number" id="p-peso" placeholder="80" min="30" max="300" step="0.1"></div>
      <div><label class="label">Altura (cm)</label><input type="number" id="p-altura" placeholder="175" min="100" max="250"></div>
      <div><label class="label">Sexo biológico</label><select id="p-sexo"><option value="">Seleccioná...</option><option value="M">Masculino</option><option value="F">Femenino</option></select></div>
      <div><label class="label">Días disponibles/semana</label><select id="p-dias"><option value="">Seleccioná...</option><option value="2">2 días</option><option value="3">3 días</option><option value="4">4 días</option><option value="5">5 días</option><option value="6">6 días</option></select></div>
      <div><label class="label">Objetivo principal</label><select id="p-objetivo"><option value="">Seleccioná...</option><option value="bajar_peso">Bajar peso</option><option value="ganar_musculo">Ganar músculo</option><option value="rendimiento">Mejorar rendimiento</option><option value="salud_general">Salud general</option></select></div>
      <div><label class="label">Nivel</label><select id="p-nivel"><option value="">Seleccioná...</option><option value="principiante">Principiante (&lt;1 año)</option><option value="intermedio">Intermedio (1–3 años)</option><option value="avanzado">Avanzado (&gt;3 años)</option></select></div>
    </div>
    <button id="savePerfil" style="font-family:'Oswald',sans-serif;font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:.05em;background:#D6FF3D;color:#16181D;border:none;border-radius:12px;padding:14px;cursor:pointer;width:100%">Guardar Perfil</button>
    <p id="perfilMsg" style="text-align:center;margin-top:10px;font-size:13px;color:#1FB7A6;display:none">✓ Perfil guardado</p>
  </div>
  <p class="h2">Métricas calculadas</p>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px">
    <div class="stat-card" style="text-align:center"><p class="muted" style="text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">IMC</p><p id="pm-imc" class="bignum">—</p><p id="pm-imcLbl" class="muted"></p></div>
    <div class="stat-card" style="text-align:center"><p class="muted" style="text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">TDEE est.</p><p id="pm-tdee" class="bignum">—</p><p class="muted">kcal/día</p></div>
    <div class="stat-card" style="text-align:center"><p class="muted" style="text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Peso ideal</p><p id="pm-ideal" class="bignum">—</p><p class="muted">kg (Devine)</p></div>
  </div>
</section>

<!-- TRAINER IA -->
<section id="sec-trainer" class="section" style="max-width:820px">
  <p class="h1">Trainer IA</p>
  <p style="color:#8A8F99;font-size:14px;margin-bottom:22px">Tu entrenador personal con IA. Conoce tu historial y tu perfil completo.</p>
  <div class="stat-card" style="margin-bottom:16px">
    <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:12px">📋 Análisis automático</p>
    <div id="autoFeed" style="display:flex;flex-direction:column;gap:8px;font-size:14px"></div>
  </div>
  <div style="background:#16181D;border-radius:16px;padding:18px;margin-bottom:16px">
    <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:6px">💡 Sugerencia para hoy</p>
    <p id="sug" style="font-size:15px;font-weight:500;color:#D6FF3D;line-height:1.5">Analizando...</p>
  </div>
  <div style="background:#fff;border:1px solid #E2E2DC;border-radius:20px;overflow:hidden">
    <div style="padding:14px 20px;border-bottom:1px solid #E2E2DC;display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;background:#D6FF3D;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px">🤖</div>
      <div><p style="font-weight:600;font-size:14px;margin:0">Coach IA</p><p class="muted">Basado en tu historial real</p></div>
    </div>
    <div id="chatMessages"></div>
    <div style="padding:14px 20px;border-top:1px solid #E2E2DC;display:flex;gap:10px">
      <input type="text" id="chatInput" placeholder="Preguntale algo… ej: ¿cuándo entrené piernas?" style="flex:1">
      <button id="chatSend" style="background:#16181D;color:#D6FF3D;border:none;border-radius:10px;padding:10px 16px;font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap">Enviar</button>
    </div>
    <div style="padding:0 20px 14px;display:flex;flex-wrap:wrap;gap:8px">
      <button class="chip qq" data-q="¿Qué músculo debería trabajar hoy según mi historial?">¿Qué trabajar hoy?</button>
      <button class="chip qq" data-q="¿Estoy sobreentrenando algún grupo muscular?">¿Sobreentrenamiento?</button>
      <button class="chip qq" data-q="¿Cuándo fue la última vez que entrené piernas?">Última vez piernas</button>
      <button class="chip qq" data-q="¿Necesito descansar hoy?">¿Descanso?</button>
      <button class="chip qq" data-q="Dame un resumen completo de mi semana de entrenamiento">Resumen semana</button>
    </div>
  </div>
</section>


<!-- ESTADÍSTICAS -->
<section id="sec-stats" class="section" style="max-width:1100px">
  <p class="h1">Estadísticas</p>
  <p style="color:#8A8F99;font-size:14px;margin-bottom:24px">Comparativos mensuales y anuales de tu historial.</p>

  <!-- Filtro de año -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap">
    <label style="font-size:13px;font-weight:600">Año:</label>
    <div id="yearBtns" style="display:flex;gap:8px;flex-wrap:wrap"></div>
  </div>

  <!-- Mes a mes: días entrenados -->
  <div class="stat-card" style="margin-bottom:18px">
    <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:6px">Días entrenados por mes</p>
    <p id="st-yearLabel" style="font-size:13px;color:#8A8F99;margin-bottom:14px"></p>
    <div style="position:relative;height:220px"><canvas id="stMonthChart"></canvas></div>
  </div>

  <!-- Año a año -->
  <div class="stat-card" style="margin-bottom:18px">
    <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:14px">Año a año — total de días entrenados</p>
    <div style="position:relative;height:200px"><canvas id="stYearChart"></canvas></div>
  </div>

  <!-- Evolución muscular por mes -->
  <div class="stat-card" style="margin-bottom:18px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
      <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin:0">Evolución mensual por músculo</p>
      <select id="stMuscSel" style="width:auto;max-width:200px;padding:6px 10px;font-size:13px"></select>
    </div>
    <div style="position:relative;height:200px"><canvas id="stMuscChart"></canvas></div>
  </div>

  <!-- Evolución por tipo de trabajo -->
  <div class="stat-card" style="margin-bottom:18px">
    <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:14px">Evolución mensual por tipo de trabajo</p>
    <div style="position:relative;height:220px"><canvas id="stTypeChart"></canvas></div>
  </div>

  <!-- Top 3 músculos por mes -->
  <div class="stat-card">
    <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8A8F99;margin-bottom:16px">Top 3 músculos por mes</p>
    <div id="stTop3" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px"></div>
  </div>
</section>

</div>

<script>
const SK='tracker_entrenos_v1', PK='tracker_perfil_v1', TZ='America/Argentina/Buenos_Aires';
const MG=[
  {g:'Pecho',items:['Pecho Superior','Pecho Medio','Pecho Inferior']},
  {g:'Espalda',items:['Dorsales','Romboides','Lumbares']},
  {g:'Core',items:['Abdominales Superiores','Abdominales Inferiores','Oblicuos','Transverso']},
  {g:'Hombros',items:['Hombro Lateral','Hombro Frontal','Hombro Trasero','Trapecio']},
  {g:'Brazos',items:['Bíceps','Tríceps']},
  {g:'Piernas',items:['Glúteos','Isquiotibiales','Cuádriceps','Gemelos','Aductores','Abductores']},
  {g:'General',items:['Full Body']},
];
const MUSC=MG.flatMap(g=>g.items);
const TIPOS=['Fuerza','Aeróbico/Cardio','Hipertrofia','Resistencia','Flexibilidad'];
const COLORS=['#16181D','#D6FF3D','#FF6B4A','#1FB7A6','#8A8F99','#A78BFA','#FB923C','#34D399','#60A5FA','#F472B6','#FACC15','#818CF8','#2DD4BF','#F87171','#4ADE80'];

// Storage
let _mem=null;
function lw(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):[]}catch{return _mem?JSON.parse(_mem):[]}}
function sw(l){const d=JSON.stringify(l);try{localStorage.setItem(SK,d)}catch{_mem=d}}
function lp(){try{const r=localStorage.getItem(PK);return r?JSON.parse(r):{}}catch{return{}}}
function sp(p){try{localStorage.setItem(PK,JSON.stringify(p))}catch{}}

// Fecha helpers
function todayAR(){return new Intl.DateTimeFormat('en-CA',{timeZone:TZ,year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date())}
function fmtC(iso){const[y,m,d]=iso.split('-').map(Number);return new Intl.DateTimeFormat('es-AR',{day:'2-digit',month:'short',timeZone:'UTC'}).format(new Date(Date.UTC(y,m-1,d)))}
function diffD(a,b){return Math.round((new Date(b+'T00:00:00Z')-new Date(a+'T00:00:00Z'))/86400000)}
function prevISO(iso){const d=new Date(iso+'T00:00:00Z');d.setUTCDate(d.getUTCDate()-1);return d.toISOString().slice(0,10)}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

// Nav
document.querySelectorAll('.nav-item').forEach(item=>{
  item.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    item.classList.add('active');
    document.getElementById('sec-'+item.dataset.sec).classList.add('active');
    if(item.dataset.sec==='dashboard') renderDB();
    if(item.dataset.sec==='trainer') renderTrainer();
    if(item.dataset.sec==='stats') renderStats();
    if(item.dataset.sec==='perfil') loadPF();
  });
});

// Chips
const sel={m:new Set(),t:new Set()};
function mkChip(op,set){
  const b=document.createElement('button');
  b.type='button';b.className='chip';b.textContent=op;

// Dashboard
let cM=null,cT=null,cW=null;
function renderDB(){
  const list=lw(),today=todayAR();
  const[y,m]=today.split('-').map(Number);
  // mes actual
  const thisSet=new Set(list.filter(w=>{const[wy,wm]=w.date.split('-').map(Number);return wy===y&&wm===m}).map(w=>w.date));
  const este=thisSet.size;
  const pd=new Date(Date.UTC(y,m-1,1));pd.setUTCMonth(pd.getUTCMonth()-1);
  const prevSet=new Set(list.filter(w=>{const[wy,wm]=w.date.split('-').map(Number);return wy===pd.getUTCFullYear()&&wm===pd.getUTCMonth()+1}).map(w=>w.date));
  const prev=prevSet.size;
  document.getElementById('d-mes').textContent=este;
  const delta=este-prev;
  const mnp=new Intl.DateTimeFormat('es-AR',{month:'long',timeZone:'UTC'}).format(pd);
  document.getElementById('d-delta').textContent=list.length?`${delta>=0?'+':''}${delta} vs ${mnp} (${prev})`:'';
  // racha
  const sorted=[...new Set(list.map(w=>w.date))].sort((a,b)=>b.localeCompare(a));
  let racha=0,cur=today;
  for(const d of sorted){if(diffD(d,cur)===0){racha++;cur=prevISO(cur)}else if(diffD(d,cur)===-1){racha++;cur=prevISO(cur)}else break}
  document.getElementById('d-racha').textContent=racha;
  document.getElementById('d-total').textContent=list.length;
  // top
  const mc={};list.forEach(w=>w.muscles.forEach(mu=>mc[mu]=(mc[mu]||0)+1));
  const top=Object.entries(mc).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('d-topmu').textContent=top?top[0]:'—';
  // último
  if(sorted.length){const gap=diffD(sorted[0],today);document.getElementById('d-ultimo').textContent=gap===0?'Hoy':gap===1?'Ayer':`Hace ${gap}d`}
  else document.getElementById('d-ultimo').textContent='—';
  // charts
  const ml=Object.keys(mc).sort((a,b)=>mc[b]-mc[a]).slice(0,12);
  const md=ml.map(k=>mc[k]);const totM=md.reduce((a,b)=>a+b,0)||1;
  if(cM)cM.destroy();
  if(ml.length){
    cM=new Chart(document.getElementById('muscleChart').getContext('2d'),{type:'bar',data:{labels:ml,datasets:[{data:md,backgroundColor:ml.map((_,i)=>COLORS[i%COLORS.length]),borderRadius:5,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.x} sesiones · ${Math.round(ctx.parsed.x/totM*100)}%`}}},scales:{x:{grid:{color:'#E2E2DC'},ticks:{font:{family:'Inter',size:11}}},y:{grid:{display:false},ticks:{font:{family:'Inter',size:12}}}}}});
  }
  const tc={};list.forEach(w=>w.types.forEach(t=>tc[t]=(tc[t]||0)+1));
  const tl=Object.keys(tc),td=tl.map(k=>tc[k]);
  if(cT)cT.destroy();
  if(tl.length){
    cT=new Chart(document.getElementById('typeChart').getContext('2d'),{type:'doughnut',data:{labels:tl,datasets:[{data:td,backgroundColor:COLORS,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:12},padding:10}},tooltip:{callbacks:{label:ctx=>{const tot=ctx.dataset.data.reduce((a,b)=>a+b,0);return `${ctx.label}: ${ctx.parsed} · ${Math.round(ctx.parsed/tot*100)}%`}}}}}});
  }
  // weekly
  const wl=[],wv=[];
  for(let i=7;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i*7);
    const s=d.toISOString().slice(0,10);
    const e=new Date(d);e.setDate(e.getDate()+6);
    const es=e.toISOString().slice(0,10);
    wl.push('S'+(8-i));wv.push(new Set(list.filter(w=>w.date>=s&&w.date<=es).map(w=>w.date)).size);
  }
  if(cW)cW.destroy();
  cW=new Chart(document.getElementById('weekChart').getContext('2d'),{type:'bar',data:{labels:wl,datasets:[{label:'Días',data:wv,backgroundColor:'#16181D',borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:7,ticks:{stepSize:1,font:{family:'Inter',size:11}},grid:{color:'#E2E2DC'}},x:{grid:{display:false},ticks:{font:{family:'Inter',size:12}}}}}});
  // balance
  const bal=document.getElementById('muscleBalance');bal.innerHTML='';
  if(!ml.length){bal.innerHTML='<p style="color:#8A8F99;font-size:14px">Sin datos aún.</p>';return}
  const maxV=Math.max(...md);
  ml.forEach((mu,i)=>{
    const pct=Math.round(md[i]/totM*100),w=Math.round(md[i]/maxV*100);
    const row=document.createElement('div');
    row.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px"><span style="font-size:13px;font-weight:500">${mu}</span><span style="font-size:12px;color:#8A8F99">${md[i]} sesiones · ${pct}%</span></div><div class="pg-bar"><div class="pg-fill" style="width:${w}%;background:${COLORS[i%COLORS.length]}"></div></div>`;
    bal.appendChild(row);
  });
}

function calcM(p){
  const peso=parseFloat(p.peso),alt=parseFloat(p.altura),edad=parseInt(p.edad),sexo=p.sexo;
  if(!peso||!alt){['pm-imc','pm-tdee','pm-ideal'].forEach(id=>document.getElementById(id).textContent='—');return}
  const h=alt/100,imc=+(peso/(h*h)).toFixed(1);
  document.getElementById('pm-imc').textContent=imc;
  const lbl=imc<18.5?'Bajo peso':imc<25?'Normal':imc<30?'Sobrepeso':'Obesidad';
  document.getElementById('pm-imcLbl').textContent=lbl;
  document.getElementById('pm-imc').style.color=imc<18.5||imc>=30?'#FF6B4A':imc<25?'#1FB7A6':'#FB923C';
  if(edad&&sexo){const bmr=sexo==='M'?10*peso+6.25*alt-5*edad+5:10*peso+6.25*alt-5*edad-161;document.getElementById('pm-tdee').textContent=Math.round(bmr*1.55)}
  if(sexo&&alt){const cm=alt-152.4,ideal=sexo==='M'?50+0.906*cm:45.5+0.906*cm;document.getElementById('pm-ideal').textContent=ideal>0?ideal.toFixed(1):'—'}
}

// Trainer: análisis local
function buildFeed(list){
  const today=todayAR(),items=[];
  const sorted=[...new Set(list.map(w=>w.date))].sort((a,b)=>b.localeCompare(a));
  if(sorted.length){
    let racha=0,cur=today;
    for(const d of sorted){if(diffD(d,cur)===0){racha++;cur=prevISO(cur)}else if(diffD(d,cur)===-1){racha++;cur=prevISO(cur)}else break}
    if(racha>=3)items.push({i:'🔥',t:`Racha de <strong>${racha} días</strong> seguidos. ¡No pares!`,c:'#1FB7A6'});
    const gap=sorted[0]?diffD(sorted[0],today):null;
    if(gap!==null&&gap>=3)items.push({i:'⚠️',t:`Hace <strong>${gap} días</strong> que no entrenás.`,c:'#FF6B4A'});
  }
  const l7=list.filter(w=>diffD(w.date,today)>=-7&&diffD(w.date,today)<=0);
  const rm=new Set(l7.flatMap(w=>w.muscles));
  const main=['Pecho','Dorsales','Cuádriceps','Glúteos','Bíceps','Tríceps','Abdominales'];
  const miss=main.filter(m=>MUSC.filter(mu=>mu.toLowerCase().includes(m.toLowerCase())||m.toLowerCase().includes(mu.toLowerCase())).every(k=>!rm.has(k)));
  if(miss.length)items.push({i:'📌',t:`Sin trabajar en 7 días: <strong>${miss.slice(0,4).join(', ')}</strong>.`,c:'#8A8F99'});
  const mc={};list.forEach(w=>w.muscles.forEach(mu=>mc[mu]=(mc[mu]||0)+1));
  const tot=list.length||1;
  Object.entries(mc).forEach(([mu,cnt])=>{if(cnt/tot>0.5&&tot>=5)items.push({i:'⚡',t:`<strong>${mu}</strong> en el ${Math.round(cnt/tot*100)}% de tus sesiones. Balanceá.`,c:'#FB923C'})});
  const tc={};list.forEach(w=>w.types.forEach(t=>tc[t]=(tc[t]||0)+1));
  const tt=Object.entries(tc).sort((a,b)=>b[1]-a[1])[0];
  if(tt&&tt[1]/tot>0.6&&tot>=5)items.push({i:'📊',t:`Entrenamiento mayormente <strong>${tt[0]}</strong> (${Math.round(tt[1]/tot*100)}%). Variá el estímulo.`,c:'#A78BFA'});
  return items.length?items:[{i:'ℹ️',t:'Registrá más entrenos para ver análisis personalizados.',c:'#8A8F99'}];
}

function buildSug(list){
  if(!list.length)return'Registrá tu primer entreno para que pueda darte sugerencias.';
  const today=todayAR();
  const sorted=[...new Set(list.map(w=>w.date))].sort((a,b)=>b.localeCompare(a));
  const gap=diffD(sorted[0],today);
  if(gap>=2)return`Llevás ${gap} días sin entrenar. Hoy es buen día para volver.`;
  const l14=list.filter(w=>diffD(w.date,today)>=-14);
  const mc14={};MUSC.forEach(m=>mc14[m]=0);l14.forEach(w=>w.muscles.forEach(mu=>mc14[mu]=(mc14[mu]||0)+1));
  const lt=Object.entries(mc14).filter(([k])=>k!=='Full Body').sort((a,b)=>a[1]-b[1]);
  if(lt.length)return`Según tu historial, <strong>${lt[0][0]}</strong> es el grupo menos trabajado en 14 días. ¡Ideal para hoy!`;
  return'Tu distribución está bastante balanceada. Seguí con tu rutina.';
}

async function sendChat(msg){
  addMsg('u',esc(msg));

  try{

let stMonthC=null, stYearC=null, stMuscC=null, stTypeC=null;
let stYear=new Date().getFullYear();

const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MESES_FULL=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function getYears(list){
  const ys=new Set(list.map(w=>parseInt(w.date.slice(0,4))));
  return [...ys].sort((a,b)=>a-b);
}

function renderStats(){
  const list=lw();
  const years=getYears(list);
  if(!years.length) years.push(new Date().getFullYear());
  if(!years.includes(stYear)) stYear=years[years.length-1];

  // Botones de año
  const yc=document.getElementById('yearBtns');yc.innerHTML='';
  years.forEach(y=>{
    const b=document.createElement('button');
    b.className='chip';b.textContent=y;
    b.setAttribute('aria-pressed',y===stYear);
    b.addEventListener('click',()=>{stYear=y;renderStats()});
    yc.appendChild(b);
  });

  document.getElementById('st-yearLabel').textContent=`Mostrando ${stYear} — ${list.filter(w=>w.date.startsWith(stYear)).length} entrenos en el año`;

  // --- Mes a mes: días entrenados ---
  const diasXMes=Array(12).fill(0);
  list.filter(w=>w.date.startsWith(stYear+''))
    .forEach(w=>{ const m=parseInt(w.date.slice(5,7))-1; diasXMes[m]++; });

  // Comparar con año anterior
  const prevYear=stYear-1;
  const diasXMesPrev=Array(12).fill(0);
  list.filter(w=>w.date.startsWith(prevYear+''))
    .forEach(w=>{ const m=parseInt(w.date.slice(5,7))-1; diasXMesPrev[m]++; });

  const hasPrev=list.some(w=>w.date.startsWith(prevYear+''));

  if(stMonthC) stMonthC.destroy();
  const dsMonth=[{label:String(stYear),data:diasXMes,backgroundColor:'#16181D',borderRadius:6,borderSkipped:false}];
  if(hasPrev) dsMonth.unshift({label:String(prevYear),data:diasXMesPrev,backgroundColor:'#D6FF3D',borderRadius:6,borderSkipped:false});
  stMonthC=new Chart(document.getElementById('stMonthChart').getContext('2d'),{
    type:'bar',
    data:{labels:MESES,datasets:dsMonth},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:hasPrev,position:'top',labels:{font:{family:'Inter',size:12},padding:12}}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{family:'Inter',size:11}},grid:{color:'#E2E2DC'}},x:{grid:{display:false},ticks:{font:{family:'Inter',size:12}}}}}
  });

  // --- Año a año ---
  const totXYear={};
  years.forEach(y=>{ totXYear[y]=new Set(list.filter(w=>w.date.startsWith(y+'')).map(w=>w.date)).size; });
  if(stYearC) stYearC.destroy();
  stYearC=new Chart(document.getElementById('stYearChart').getContext('2d'),{
    type:'bar',
    data:{
      labels:Object.keys(totXYear),
      datasets:[{
        label:'Días entrenados',
        data:Object.values(totXYear),
        backgroundColor:Object.keys(totXYear).map(y=>parseInt(y)===stYear?'#D6FF3D':'#16181D'),
        borderRadius:8,borderSkipped:false
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y} días entrenados`}}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{family:'Inter',size:11}},grid:{color:'#E2E2DC'}},x:{grid:{display:false},ticks:{font:{family:'Inter',size:13,weight:'600'}}}}}
  });

  // --- Selector de músculo ---
  const msel=document.getElementById('stMuscSel');
  const prevVal=msel.value;
  msel.innerHTML='';
  MUSC.forEach(m=>{ const o=document.createElement('option');o.value=m;o.textContent=m;msel.appendChild(o); });
  if(prevVal&&MUSC.includes(prevVal)) msel.value=prevVal;
  msel.onchange=()=>renderMuscEvol(list,stYear);
  renderMuscEvol(list,stYear);

  // --- Tipo por mes ---
  renderTypeEvol(list,stYear);

  // --- Top 3 por mes ---
  renderTop3(list,stYear);
}

function renderMuscEvol(list,year){
  const mu=document.getElementById('stMuscSel').value||MUSC[0];
  const data=Array(12).fill(0);
  list.filter(w=>w.date.startsWith(year+'')).forEach(w=>{
    if(w.muscles.includes(mu)){ const m=parseInt(w.date.slice(5,7))-1; data[m]++; }
  });
  if(stMuscC) stMuscC.destroy();
  stMuscC=new Chart(document.getElementById('stMuscChart').getContext('2d'),{
    type:'line',
    data:{labels:MESES,datasets:[{label:mu,data,borderColor:'#FF6B4A',backgroundColor:'rgba(255,107,74,.12)',fill:true,tension:.35,pointRadius:5,pointBackgroundColor:'#FF6B4A',borderWidth:2.5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y} sesiones`}}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{family:'Inter',size:11}},grid:{color:'#E2E2DC'}},x:{grid:{display:false},ticks:{font:{family:'Inter',size:12}}}}}
  });
}

function renderTypeEvol(list,year){
  const tc={};
  TIPOS.forEach(t=>tc[t]=Array(12).fill(0));
  list.filter(w=>w.date.startsWith(year+'')).forEach(w=>{
    const m=parseInt(w.date.slice(5,7))-1;
    w.types.forEach(t=>{ if(tc[t]) tc[t][m]++; });
  });
  const usedTypes=TIPOS.filter(t=>tc[t].some(v=>v>0));
  if(stTypeC) stTypeC.destroy();
  const typeColors=['#16181D','#FF6B4A','#1FB7A6','#A78BFA','#FB923C'];
  stTypeC=new Chart(document.getElementById('stTypeChart').getContext('2d'),{
    type:'line',
    data:{labels:MESES,datasets:usedTypes.map((t,i)=>({label:t,data:tc[t],borderColor:typeColors[i%typeColors.length],backgroundColor:'transparent',tension:.35,pointRadius:4,pointBackgroundColor:typeColors[i%typeColors.length],borderWidth:2}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{family:'Inter',size:12},padding:12}}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{family:'Inter',size:11}},grid:{color:'#E2E2DC'}},x:{grid:{display:false},ticks:{font:{family:'Inter',size:12}}}}}
  });
}

function renderTop3(list,year){
  const cont=document.getElementById('stTop3');cont.innerHTML='';
  const months=[];
  for(let i=0;i<12;i++){
    const mc={};
    list.filter(w=>w.date.startsWith(year+'')&&parseInt(w.date.slice(5,7))-1===i)
      .forEach(w=>w.muscles.forEach(m=>mc[m]=(mc[m]||0)+1));
    if(Object.keys(mc).length) months.push({mes:i,mc});
  }
  if(!months.length){ cont.innerHTML='<p style="color:#8A8F99;font-size:14px;grid-column:1/-1">Sin datos para este año.</p>'; return; }
  months.forEach(({mes,mc})=>{
    const top=Object.entries(mc).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const card=document.createElement('div');
    card.style='background:#F5F5F0;border-radius:12px;padding:14px';
    card.innerHTML=`<p style="font-family:\'Oswald\',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">${MESES_FULL[mes]}</p>`+
      top.map(([mu,cnt],i)=>{
        const rankColor=i===0?'#D6FF3D':i===1?'#C0C0C0':'#FB923C';
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:${rankColor};min-width:22px;text-align:center">${i+1}</span>
          <span style="font-size:13px;font-weight:500;flex:1">${mu}</span>
          <span style="font-size:12px;color:#8A8F99">${cnt}x</span>
        </div>`;
      }).join('');
    cont.appendChild(card);
  });
}
